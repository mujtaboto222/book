<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VaultDocs Admin — User Management</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #0f1535; --navy-mid: #1a2550;
  --cyan: #00c2e0; --white: #f5f7ff;
  --muted: #8a9bc4; --border: rgba(0,194,224,0.2);
  --green: #00e0a0; --red: #ff6b6b; --gold: #e8c97a;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--navy); color: var(--white); font-family: 'DM Sans', sans-serif; min-height: 100vh; }
body::before {
  content: ''; position: fixed; inset: 0;
  background-image: linear-gradient(rgba(0,194,224,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,194,224,0.03) 1px, transparent 1px);
  background-size: 60px 60px; pointer-events: none;
}
header {
  position: sticky; top: 0; z-index: 10;
  display: flex; align-items: center; justify-content: space-between;
  padding: 1rem 2rem;
  background: rgba(15,21,53,0.97); backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
}
.brand { font-family: 'Space Mono', monospace; font-size: 0.75rem; color: var(--cyan); letter-spacing: 0.12em; text-transform: uppercase; }
.logout { background: none; border: 1px solid var(--border); color: var(--muted); font-size: 0.78rem; padding: 0.4rem 1rem; border-radius: 4px; cursor: pointer; transition: all 0.2s; }
.logout:hover { border-color: var(--cyan); color: var(--cyan); }

main { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem; }
h2 { font-size: 1.3rem; font-weight: 700; margin-bottom: 0.3rem; }
.subtitle { font-size: 0.82rem; color: var(--muted); margin-bottom: 2rem; }

.stats { display: flex; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap; }
.stat-card {
  flex: 1; min-width: 120px;
  background: rgba(26,37,80,0.7); border: 1px solid var(--border);
  border-radius: 10px; padding: 1rem 1.2rem;
}
.stat-card .num { font-size: 1.8rem; font-weight: 700; line-height: 1; }
.stat-card .lbl { font-size: 0.72rem; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; margin-top: 0.3rem; }
.stat-card.pending .num { color: var(--gold); }
.stat-card.approved .num { color: var(--green); }
.stat-card.total .num { color: var(--cyan); }

.section-title {
  font-family: 'Space Mono', monospace; font-size: 0.68rem;
  color: var(--muted); letter-spacing: 0.12em; text-transform: uppercase;
  margin-bottom: 0.8rem; display: flex; align-items: center; gap: 0.5rem;
}
.badge { background: var(--gold); color: var(--navy); font-size: 0.65rem; font-weight: 700; padding: 0.1rem 0.5rem; border-radius: 100px; }
.badge.green { background: var(--green); }

.user-list { display: flex; flex-direction: column; gap: 0.7rem; margin-bottom: 2.5rem; }
.user-card {
  display: flex; align-items: center; gap: 1rem;
  background: rgba(26,37,80,0.6); border: 1px solid var(--border);
  border-radius: 10px; padding: 1rem 1.2rem;
  transition: border-color 0.2s;
}
.user-card:hover { border-color: rgba(0,194,224,0.4); }
.avatar {
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--navy-mid); border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 0.9rem; font-weight: 700; color: var(--cyan);
  flex-shrink: 0; text-transform: uppercase;
}
.user-info { flex: 1; }
.user-name { font-size: 0.9rem; font-weight: 600; margin-bottom: 0.1rem; }
.user-email { font-size: 0.78rem; color: var(--muted); }
.user-date { font-size: 0.72rem; color: rgba(138,155,196,0.5); margin-top: 0.15rem; }
.user-actions { display: flex; gap: 0.5rem; flex-shrink: 0; }
.btn-approve {
  background: rgba(0,224,160,0.1); border: 1px solid rgba(0,224,160,0.3);
  color: var(--green); font-size: 0.78rem; font-weight: 600;
  padding: 0.4rem 1rem; border-radius: 5px; cursor: pointer; transition: all 0.2s;
}
.btn-approve:hover { background: rgba(0,224,160,0.2); }
.btn-revoke {
  background: rgba(255,107,107,0.08); border: 1px solid rgba(255,107,107,0.25);
  color: var(--red); font-size: 0.78rem; font-weight: 600;
  padding: 0.4rem 1rem; border-radius: 5px; cursor: pointer; transition: all 0.2s;
}
.btn-revoke:hover { background: rgba(255,107,107,0.18); }
.status-dot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
}
.dot-pending { background: var(--gold); box-shadow: 0 0 6px rgba(232,201,122,0.5); }
.dot-approved { background: var(--green); box-shadow: 0 0 6px rgba(0,224,160,0.5); }

.empty { text-align: center; padding: 2rem; color: var(--muted); font-size: 0.85rem; }
#loading-msg { text-align: center; padding: 3rem; color: var(--muted); }

/* Login gate */
#admin-login {
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
}
.login-card {
  background: rgba(26,37,80,0.7); backdrop-filter: blur(20px);
  border: 1px solid var(--border); border-radius: 16px;
  padding: 2.5rem 2rem; width: 100%; max-width: 380px; margin: 1rem;
}
.login-card h2 { margin-bottom: 1.5rem; font-size: 1.1rem; }
input[type="email"], input[type="password"] {
  width: 100%; background: rgba(15,21,53,0.7);
  border: 1px solid var(--border); border-radius: 7px;
  padding: 0.7rem 0.9rem; color: var(--white); font-size: 0.87rem;
  font-family: 'DM Sans', sans-serif; outline: none;
  transition: border-color 0.2s; margin-bottom: 0.8rem;
}
input:focus { border-color: var(--cyan); }
.btn-login {
  width: 100%; background: var(--cyan); color: var(--navy);
  border: none; border-radius: 7px; padding: 0.8rem;
  font-size: 0.87rem; font-weight: 700; cursor: pointer;
  transition: all 0.2s;
}
.btn-login:hover { opacity: 0.9; }
.err { font-size: 0.78rem; color: var(--red); margin-top: 0.5rem; text-align: center; }
</style>
</head>
<body>

<!-- ADMIN LOGIN GATE -->
<div id="admin-login">
  <div class="login-card">
    <h2>🔐 Admin Access</h2>
    <input type="email" id="adm-email" placeholder="Admin email">
    <input type="password" id="adm-pass" placeholder="Password" onkeydown="if(event.key==='Enter')adminLogin()">
    <button class="btn-login" onclick="adminLogin()">Sign In as Admin</button>
    <p class="err" id="adm-err"></p>
  </div>
</div>

<!-- ADMIN DASHBOARD -->
<div id="admin-dash" style="display:none">
  <header>
    <span class="brand">⚡ VaultDocs Admin — User Management</span>
    <button class="logout" onclick="adminLogout()">Sign Out</button>
  </header>
  <main>
    <h2>User Access Control</h2>
    <p class="subtitle">Approve or revoke access to F(Orth) Part B Easy Study Notes</p>

    <div class="stats">
      <div class="stat-card pending"><div class="num" id="count-pending">—</div><div class="lbl">Pending</div></div>
      <div class="stat-card approved"><div class="num" id="count-approved">—</div><div class="lbl">Approved</div></div>
      <div class="stat-card total"><div class="num" id="count-total">—</div><div class="lbl">Total</div></div>
    </div>

    <div id="loading-msg">Loading users…</div>

    <div id="pending-section" style="display:none">
      <div class="section-title">Pending Approval <span class="badge" id="pending-badge">0</span></div>
      <div class="user-list" id="pending-list"></div>
    </div>

    <div id="approved-section" style="display:none">
      <div class="section-title">Approved Users <span class="badge green" id="approved-badge">0</span></div>
      <div class="user-list" id="approved-list"></div>
    </div>
  </main>
</div>

<script>
const SUPABASE_URL = 'https://djbiatgxjmvwfcimofjt.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRqYmlhdGd4am12d2ZjaW1vZmp0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2NjU1MjcsImV4cCI6MjA5MDI0MTUyN30.m_gBey_jA13hVdjttSKtFMcrQO-dGokq1Fpu2XriLp0';
let supabase;
window.addEventListener('load', () => {
  supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
});

let adminSession = null;

async function adminLogin() {
  const email = document.getElementById('adm-email').value.trim();
  const pass = document.getElementById('adm-pass').value;
  const { data, error } = await supabase.auth.signInWithPassword({ email, password: pass });
  if (error) { document.getElementById('adm-err').textContent = error.message; return; }
  
  // Check if this user is marked as admin in profiles
  const { data: profile } = await supabase.from('profiles').select('is_admin').eq('id', data.user.id).single();
  if (!profile?.is_admin) {
    await supabase.auth.signOut();
    document.getElementById('adm-err').textContent = 'You do not have admin access.';
    return;
  }
  adminSession = data.session;
  document.getElementById('admin-login').style.display = 'none';
  document.getElementById('admin-dash').style.display = 'block';
  loadUsers();
}

async function adminLogout() {
  await supabase.auth.signOut();
  window.location.reload();
}

async function loadUsers() {
  document.getElementById('loading-msg').style.display = 'block';
  const { data: users, error } = await supabase.from('profiles').select('*').order('created_at', { ascending: false });
  document.getElementById('loading-msg').style.display = 'none';
  if (error || !users) return;

  const pending = users.filter(u => !u.approved);
  const approved = users.filter(u => u.approved);

  document.getElementById('count-pending').textContent = pending.length;
  document.getElementById('count-approved').textContent = approved.length;
  document.getElementById('count-total').textContent = users.length;
  document.getElementById('pending-badge').textContent = pending.length;
  document.getElementById('approved-badge').textContent = approved.length;

  renderList('pending-list', pending, false);
  renderList('approved-list', approved, true);

  document.getElementById('pending-section').style.display = pending.length ? 'block' : 'none';
  document.getElementById('approved-section').style.display = approved.length ? 'block' : 'none';

  if (!pending.length && !approved.length) {
    document.getElementById('loading-msg').textContent = 'No users yet.';
    document.getElementById('loading-msg').style.display = 'block';
  }
}

function renderList(containerId, users, isApproved) {
  const container = document.getElementById(containerId);
  if (!users.length) { container.innerHTML = '<div class="empty">None</div>'; return; }
  container.innerHTML = users.map(u => `
    <div class="user-card">
      <div class="status-dot ${isApproved ? 'dot-approved' : 'dot-pending'}"></div>
      <div class="avatar">${(u.full_name || u.email || '?')[0]}</div>
      <div class="user-info">
        <div class="user-name">${u.full_name || '(No name)'}</div>
        <div class="user-email">${u.email || ''}</div>
        <div class="user-date">Joined: ${u.created_at ? new Date(u.created_at).toLocaleDateString() : '—'}</div>
      </div>
      <div class="user-actions">
        ${!isApproved ? `<button class="btn-approve" onclick="approveUser('${u.id}')">✓ Approve</button>` : ''}
        ${isApproved ? `<button class="btn-revoke" onclick="revokeUser('${u.id}')">✕ Revoke</button>` : ''}
      </div>
    </div>
  `).join('');
}

async function approveUser(id) {
  await supabase.from('profiles').update({ approved: true }).eq('id', id);
  loadUsers();
}
async function revokeUser(id) {
  if (!confirm('Revoke access for this user?')) return;
  await supabase.from('profiles').update({ approved: false }).eq('id', id);
  loadUsers();
}
</script>
</body>
</html>
