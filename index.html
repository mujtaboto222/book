<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>F(Orth) Part B — Sign In</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #0f1535;
  --navy-mid: #1a2550;
  --navy-light: #243070;
  --cyan: #00c2e0;
  --cyan-glow: rgba(0,194,224,0.15);
  --gold: #e8c97a;
  --white: #f5f7ff;
  --muted: #8a9bc4;
  --border: rgba(0,194,224,0.2);
  --error: #ff6b6b;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--navy);
  color: var(--white);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(0,194,224,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,194,224,0.04) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events: none;
}
.orb {
  position: fixed; border-radius: 50%;
  filter: blur(120px); pointer-events: none;
}
.orb-1 { width: 500px; height: 500px; background: rgba(0,194,224,0.08); top: -150px; right: -100px; }
.orb-2 { width: 400px; height: 400px; background: rgba(36,48,112,0.6); bottom: -100px; left: -100px; }

.card {
  position: relative; z-index: 1;
  background: rgba(26,37,80,0.7);
  backdrop-filter: blur(20px);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 3rem 2.5rem;
  width: 100%; max-width: 420px;
  margin: 1rem;
  box-shadow: 0 40px 80px rgba(0,0,0,0.4);
}
.card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, transparent, var(--cyan), transparent);
  border-radius: 20px 20px 0 0;
}

.logo {
  text-align: center;
  margin-bottom: 2rem;
}
.logo-tag {
  font-family: 'Space Mono', monospace;
  font-size: 0.65rem;
  color: var(--cyan);
  letter-spacing: 0.16em;
  text-transform: uppercase;
  margin-bottom: 0.6rem;
  display: block;
}
.logo h1 {
  font-family: 'Playfair Display', serif;
  font-size: 1.5rem;
  font-weight: 900;
  line-height: 1.2;
  margin-bottom: 0.3rem;
}
.logo h1 em { font-style: normal; color: var(--cyan); }
.logo p {
  font-size: 0.78rem;
  color: var(--muted);
  letter-spacing: 0.04em;
}

.tabs {
  display: flex;
  background: rgba(15,21,53,0.6);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 3px;
  margin-bottom: 1.8rem;
}
.tab {
  flex: 1; text-align: center;
  padding: 0.55rem;
  font-size: 0.82rem;
  font-weight: 600;
  border-radius: 6px;
  cursor: pointer;
  color: var(--muted);
  transition: all 0.2s;
  border: none; background: none;
}
.tab.active {
  background: var(--cyan);
  color: var(--navy);
}

.form-group { margin-bottom: 1.2rem; }
label {
  display: block;
  font-size: 0.78rem;
  color: var(--muted);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  margin-bottom: 0.5rem;
  font-weight: 500;
}
input[type="email"], input[type="password"], input[type="text"] {
  width: 100%;
  background: rgba(15,21,53,0.7);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 0.75rem 1rem;
  color: var(--white);
  font-size: 0.9rem;
  font-family: 'DM Sans', sans-serif;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
input:focus {
  border-color: var(--cyan);
  box-shadow: 0 0 0 3px rgba(0,194,224,0.1);
}
input::placeholder { color: rgba(138,155,196,0.5); }

.btn {
  width: 100%;
  background: var(--cyan);
  color: var(--navy);
  border: none;
  border-radius: 8px;
  padding: 0.85rem;
  font-size: 0.9rem;
  font-weight: 700;
  font-family: 'DM Sans', sans-serif;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.25s;
  box-shadow: 0 0 20px rgba(0,194,224,0.3);
  margin-top: 0.4rem;
}
.btn:hover { transform: translateY(-1px); box-shadow: 0 0 35px rgba(0,194,224,0.5); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

.msg {
  font-size: 0.82rem;
  padding: 0.7rem 1rem;
  border-radius: 6px;
  margin-top: 1rem;
  text-align: center;
  display: none;
}
.msg.error { background: rgba(255,107,107,0.1); border: 1px solid rgba(255,107,107,0.3); color: var(--error); display: block; }
.msg.success { background: rgba(0,194,224,0.1); border: 1px solid var(--border); color: var(--cyan); display: block; }

.pending-notice {
  margin-top: 1rem;
  padding: 1rem;
  background: rgba(232,201,122,0.08);
  border: 1px solid rgba(232,201,122,0.2);
  border-radius: 8px;
  font-size: 0.8rem;
  color: var(--gold);
  text-align: center;
  line-height: 1.6;
  display: none;
}

.footer-note {
  text-align: center;
  margin-top: 1.5rem;
  font-size: 0.72rem;
  color: rgba(138,155,196,0.5);
}
</style>
</head>
<body>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div class="card">
  <div class="logo">
    <span class="logo-tag">🔐 Protected Access</span>
    <h1>F(Orth) Part B<br><em>Easy Study Notes</em></h1>
    <p>Before the Exam · Volume 1 · Ortho Times</p>
  </div>

  <div class="tabs">
    <button class="tab active" id="tab-login" onclick="showTab('login')">Sign In</button>
    <button class="tab" id="tab-signup" onclick="showTab('signup')">Request Access</button>
  </div>

  <!-- LOGIN FORM -->
  <div id="form-login">
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="login-email" placeholder="your@email.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn" id="login-btn" onclick="doLogin()">Sign In →</button>
    <div class="msg" id="login-msg"></div>
  </div>

  <!-- SIGNUP FORM -->
  <div id="form-signup" style="display:none">
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="signup-name" placeholder="Dr. Your Name">
    </div>
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="signup-email" placeholder="your@email.com">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="signup-password" placeholder="Min. 8 characters">
    </div>
    <button class="btn" id="signup-btn" onclick="doSignup()">Request Access →</button>
    <div class="msg" id="signup-msg"></div>
    <div class="pending-notice" id="pending-notice">
      ✅ Your request has been submitted.<br>
      Access is granted manually. You will be able to sign in once your account is approved.
    </div>
  </div>

  <div class="footer-note">M.B. Mekki · Ortho Times · Independent Study Resource</div>
</div>

<script>
// ── SUPABASE CONFIG — replace with your keys ──
const SUPABASE_URL = 'https://djbiatgxjmvwfcimofjt.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRqYmlhdGd4am12d2ZjaW1vZmp0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2NjU1MjcsImV4cCI6MjA5MDI0MTUyN30.m_gBey_jA13hVdjttSKtFMcrQO-dGokq1Fpu2XriLp0';
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ── Check if already logged in ──
(async () => {
  const { data: { session } } = await supabase.auth.getSession();
  if (session) {
    // Check if approved
    const { data: profile } = await supabase
      .from('profiles')
      .select('approved')
      .eq('id', session.user.id)
      .single();
    if (profile?.approved) {
      localStorage.setItem('vaultdocs_session', session.access_token);
      window.location.href = 'viewer.html';
    }
  }
})();

function showTab(tab) {
  document.getElementById('form-login').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('form-signup').style.display = tab === 'signup' ? 'block' : 'none';
  document.getElementById('tab-login').classList.toggle('active', tab === 'login');
  document.getElementById('tab-signup').classList.toggle('active', tab === 'signup');
}

function showMsg(id, text, type) {
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = 'msg ' + type;
}

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  if (!email || !password) return showMsg('login-msg', 'Please fill in all fields.', 'error');

  const btn = document.getElementById('login-btn');
  btn.disabled = true; btn.textContent = 'Signing in…';

  const { data, error } = await supabase.auth.signInWithPassword({ email, password });
  if (error) {
    showMsg('login-msg', error.message, 'error');
    btn.disabled = false; btn.textContent = 'Sign In →';
    return;
  }

  // Check approved
  const { data: profile } = await supabase
    .from('profiles')
    .select('approved')
    .eq('id', data.user.id)
    .single();

  if (!profile?.approved) {
    await supabase.auth.signOut();
    showMsg('login-msg', 'Your account is pending approval. Please check back soon.', 'error');
    btn.disabled = false; btn.textContent = 'Sign In →';
    return;
  }

  localStorage.setItem('vaultdocs_session', data.session.access_token);
  window.location.href = 'viewer.html';
}

async function doSignup() {
  const name = document.getElementById('signup-name').value.trim();
  const email = document.getElementById('signup-email').value.trim();
  const password = document.getElementById('signup-password').value;

  if (!name || !email || !password) return showMsg('signup-msg', 'Please fill in all fields.', 'error');
  if (password.length < 8) return showMsg('signup-msg', 'Password must be at least 8 characters.', 'error');

  const btn = document.getElementById('signup-btn');
  btn.disabled = true; btn.textContent = 'Submitting…';

  const { data, error } = await supabase.auth.signUp({
    email, password,
    options: { data: { full_name: name } }
  });

  if (error) {
    showMsg('signup-msg', error.message, 'error');
    btn.disabled = false; btn.textContent = 'Request Access →';
    return;
  }

  // Insert into profiles as not approved
  await supabase.from('profiles').upsert({
    id: data.user.id,
    full_name: name,
    email: email,
    approved: false
  });

  document.getElementById('signup-btn').style.display = 'none';
  document.getElementById('pending-notice').style.display = 'block';
}

// Enter key
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    if (document.getElementById('form-login').style.display !== 'none') doLogin();
    else doSignup();
  }
});
</script>
</body>
</html>
