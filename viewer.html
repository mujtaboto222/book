<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>F(Orth) Part B — Study Notes Viewer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
<style>
:root {
  --navy: #0f1535;
  --navy-mid: #1a2550;
  --cyan: #00c2e0;
  --white: #f5f7ff;
  --muted: #8a9bc4;
  --border: rgba(0,194,224,0.2);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--navy);
  color: var(--white);
  font-family: 'Segoe UI', system-ui, sans-serif;
  user-select: none;
  -webkit-user-select: none;
  -moz-user-select: none;
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(0,194,224,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,194,224,0.03) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events: none; z-index: 0;
}
.topbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0.8rem 2rem;
  background: rgba(15,21,53,0.95);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
}
.topbar-brand { font-size: 0.8rem; font-weight: 700; color: var(--cyan); letter-spacing: 0.1em; text-transform: uppercase; }
.topbar-right { display: flex; align-items: center; gap: 1.5rem; }
.page-info { font-size: 0.8rem; color: var(--muted); }
.logout-btn {
  background: transparent; border: 1px solid var(--border);
  color: var(--muted); font-size: 0.78rem; padding: 0.4rem 1rem;
  border-radius: 4px; cursor: pointer; transition: all 0.2s;
}
.logout-btn:hover { border-color: var(--cyan); color: var(--cyan); }
.toolbar {
  position: fixed; top: 52px; left: 0; right: 0; z-index: 99;
  display: flex; align-items: center; justify-content: center; gap: 0.8rem;
  padding: 0.6rem 2rem;
  background: rgba(26,37,80,0.95);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
}
.tb-btn {
  background: rgba(0,194,224,0.08); border: 1px solid var(--border);
  color: var(--white); font-size: 0.82rem; padding: 0.4rem 1rem;
  border-radius: 5px; cursor: pointer; transition: all 0.2s;
}
.tb-btn:hover { background: rgba(0,194,224,0.18); border-color: var(--cyan); }
.tb-divider { width: 1px; height: 24px; background: var(--border); }
.zoom-label { font-size: 0.8rem; color: var(--muted); min-width: 48px; text-align: center; }
#viewer-wrap {
  position: relative; z-index: 1;
  margin-top: 100px;
  padding: 2rem 1rem 4rem;
  display: flex; flex-direction: column; align-items: center;
  min-height: calc(100vh - 100px);
}
#loading {
  display: flex; flex-direction: column; align-items: center; gap: 1rem;
  padding: 6rem 2rem; color: var(--muted);
}
.spinner {
  width: 40px; height: 40px;
  border: 3px solid var(--border);
  border-top-color: var(--cyan);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.load-text { font-size: 0.85rem; }
.canvas-wrap {
  position: relative; margin: 0 auto;
  box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  border: 1px solid var(--border); border-radius: 4px;
  overflow: hidden; display: block;
}
.canvas-wrap canvas { display: block; }
.canvas-wrap::after {
  content: 'F(ORTH) PART B EASY STUDY NOTES · ORTHO TIMES · M.B. MEKKI';
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.1rem; font-weight: 700; letter-spacing: 0.2em;
  color: rgba(0,194,224,0.07); pointer-events: none;
  white-space: nowrap; overflow: hidden;
  transform: rotate(-30deg) scale(1.5);
  text-transform: uppercase; z-index: 10;
}
.page-nav {
  position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%);
  display: flex; align-items: center; gap: 1rem; z-index: 100;
  background: rgba(15,21,53,0.95); backdrop-filter: blur(12px);
  border: 1px solid var(--border); border-radius: 50px;
  padding: 0.6rem 1.4rem;
}
.nav-btn {
  background: none; border: none; color: var(--white);
  font-size: 1.1rem; cursor: pointer; padding: 0.2rem 0.5rem;
  border-radius: 4px; transition: color 0.2s;
}
.nav-btn:hover { color: var(--cyan); }
.nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.page-input {
  width: 48px; text-align: center;
  background: transparent; border: none; border-bottom: 1px solid var(--border);
  color: var(--white); font-size: 0.85rem; padding: 0.1rem 0.2rem; outline: none;
}
.page-input:focus { border-bottom-color: var(--cyan); }
.page-total { font-size: 0.82rem; color: var(--muted); }
#dt-warning {
  display: none; position: fixed; inset: 0; z-index: 9999;
  background: var(--navy);
  flex-direction: column; align-items: center; justify-content: center; gap: 1rem;
  text-align: center;
}
#dt-warning h2 { font-size: 1.6rem; color: var(--cyan); }
#dt-warning p { color: var(--muted); max-width: 400px; line-height: 1.7; }
</style>
</head>
<body>

<div id="dt-warning">
  <h2>⚠ Access Paused</h2>
  <p>Developer tools detected. Please close DevTools to continue reading.</p>
</div>

<div class="topbar">
  <span class="topbar-brand">F(Orth) Part B · Easy Study Notes</span>
  <div class="topbar-right">
    <span class="page-info" id="top-page-info">Loading…</span>
    <button class="logout-btn" onclick="logout()">Sign Out</button>
  </div>
</div>

<div class="toolbar">
  <button class="tb-btn" onclick="zoomOut()">− Zoom</button>
  <span class="zoom-label" id="zoom-label">100%</span>
  <button class="tb-btn" onclick="zoomIn()">+ Zoom</button>
  <div class="tb-divider"></div>
  <button class="tb-btn" onclick="fitWidth()">⟷ Fit Width</button>
  <button class="tb-btn" onclick="fitPage()">⛶ Fit Page</button>
</div>

<div id="viewer-wrap">
  <div id="loading">
    <div class="spinner"></div>
    <p class="load-text">Loading your study notes…</p>
  </div>
</div>

<div class="page-nav">
  <button class="nav-btn" id="btn-first" onclick="goFirst()">⟪</button>
  <button class="nav-btn" id="btn-prev" onclick="goPrev()">‹</button>
  <input class="page-input" id="page-input" type="number" min="1" value="1" onchange="goToPage(this.value)">
  <span class="page-total" id="page-total">/ —</span>
  <button class="nav-btn" id="btn-next" onclick="goNext()">›</button>
  <button class="nav-btn" id="btn-last" onclick="goLast()">⟫</button>
</div>

<script>
document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('keydown', e => {
  const blocked = [
    e.ctrlKey && ['c','a','s','p','u'].includes(e.key.toLowerCase()),
    e.metaKey && ['c','a','s','p','u'].includes(e.key.toLowerCase()),
    e.key === 'PrintScreen', e.key === 'F12',
    e.ctrlKey && e.shiftKey && ['i','j','c'].includes(e.key.toLowerCase()),
  ];
  if (blocked.some(Boolean)) { e.preventDefault(); e.stopPropagation(); return false; }
});
document.addEventListener('copy', e => e.preventDefault());
document.addEventListener('cut', e => e.preventDefault());
document.addEventListener('dragstart', e => e.preventDefault());
window.addEventListener('beforeprint', e => { e.preventDefault(); window.stop(); });

const dtWarning = document.getElementById('dt-warning');
let devToolsOpen = false;
setInterval(() => {
  const open = window.outerWidth - window.innerWidth > 160 || window.outerHeight - window.innerHeight > 160;
  if (open !== devToolsOpen) { devToolsOpen = open; dtWarning.style.display = open ? 'flex' : 'none'; }
}, 1000);

pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

let pdfDoc = null, currentPage = 1, totalPages = 0, scale = 1.5, rendering = false, renderQueue = null;

async function loadPDF() {
  try {
    document.querySelector('.load-text').textContent = 'Fetching…';
    const response = await fetch('book.pdf');
    const arrayBuffer = await response.arrayBuffer();
    document.querySelector('.load-text').textContent = 'Rendering…';
    const loadingTask = pdfjsLib.getDocument({data: arrayBuffer});
    pdfDoc = await loadingTask.promise;
    totalPages = pdfDoc.numPages;
    document.getElementById('page-total').textContent = '/ ' + totalPages;
    document.getElementById('loading').style.display = 'none';
    renderPage(1);
  } catch(e) {
    document.querySelector('.load-text').textContent = 'Error: ' + e.message;
  }
}

async function renderPage(num) {
  if (rendering) { renderQueue = num; return; }
  rendering = true; currentPage = num; updateNav();
  const page = await pdfDoc.getPage(num);
  const viewport = page.getViewport({ scale });
  const wrap = document.getElementById('viewer-wrap');
  const old = wrap.querySelector('.canvas-wrap');
  if (old) old.remove();
  const div = document.createElement('div');
  div.className = 'canvas-wrap';
  const canvas = document.createElement('canvas');
  canvas.width = viewport.width; canvas.height = viewport.height;
  div.style.width = viewport.width + 'px'; div.style.height = viewport.height + 'px';
  div.appendChild(canvas); wrap.appendChild(div);
  await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
  rendering = false;
  if (renderQueue !== null) { const next = renderQueue; renderQueue = null; renderPage(next); }
}

function updateNav() {
  document.getElementById('page-input').value = currentPage;
  document.getElementById('top-page-info').textContent = `Page ${currentPage} of ${totalPages}`;
  document.getElementById('btn-prev').disabled = currentPage <= 1;
  document.getElementById('btn-first').disabled = currentPage <= 1;
  document.getElementById('btn-next').disabled = currentPage >= totalPages;
  document.getElementById('btn-last').disabled = currentPage >= totalPages;
  document.getElementById('zoom-label').textContent = Math.round(scale * 100) + '%';
}

function goPrev() { if (currentPage > 1) renderPage(currentPage - 1); }
function goNext() { if (currentPage < totalPages) renderPage(currentPage + 1); }
function goFirst() { renderPage(1); }
function goLast() { renderPage(totalPages); }
function goToPage(n) { renderPage(Math.max(1, Math.min(totalPages, parseInt(n) || 1))); }
function zoomIn() { scale = Math.min(3, scale + 0.25); renderPage(currentPage); }
function zoomOut() { scale = Math.max(0.5, scale - 0.25); renderPage(currentPage); }
function fitWidth() { scale = (window.innerWidth - 80) / 612; renderPage(currentPage); }
function fitPage() { scale = 1.5; renderPage(currentPage); }

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') goNext();
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') goPrev();
});

async function logout() {
  localStorage.removeItem('vaultdocs_session');
  try {
    const sb = window.supabase.createClient(
      'https://djbiatgxjmvwfcimofjt.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRqYmlhdGd4am12d2ZjaW1vZmp0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2NjU1MjcsImV4cCI6MjA5MDI0MTUyN30.m_gBey_jA13hVdjttSKtFMcrQO-dGokq1Fpu2XriLp0'
    );
    await sb.auth.signOut();
  } catch(e) {}
  window.location.href = 'index.html';
}

if (!localStorage.getItem('vaultdocs_session')) {
  window.location.href = 'index.html';
} else {
  loadPDF();
}
</script>
</body>
</html>
