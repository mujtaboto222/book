<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>F(Orth) Part B — Study Notes</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --border: rgba(255,255,255,0.07);
    --text: #e0e0e0;
    --muted: #555;
    --accent: #00c2e0;
    --sidebar-w: 52px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; background: var(--bg); }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    color: var(--text);
    user-select: none;
    -webkit-user-select: none;
  }

  /* SIDEBAR */
  #sidebar {
    position: fixed; top: 0; right: 0; bottom: 0;
    width: var(--sidebar-w);
    background: var(--surface);
    border-left: 1px solid var(--border);
    display: flex; flex-direction: column; align-items: center;
    padding: 12px 0; gap: 4px; z-index: 100;
  }

  .sb-btn {
    width: 36px; height: 36px;
    background: none; border: none; border-radius: 6px;
    color: var(--muted); font-size: 14px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: color 0.15s, background 0.15s;
    -webkit-tap-highlight-color: transparent; flex-shrink: 0;
  }
  .sb-btn:hover, .sb-btn.active { color: var(--accent); background: rgba(0,194,224,0.08); }
  .sb-btn:active { background: rgba(0,194,224,0.15); }

  .sb-divider { width: 24px; height: 1px; background: var(--border); flex-shrink: 0; margin: 4px 0; }
  .sb-spacer { flex: 1; }

  .sb-page {
    display: flex; flex-direction: column; align-items: center; gap: 2px; padding: 6px 0;
  }
  .sb-page input {
    width: 36px; height: 28px; background: transparent;
    border: 1px solid var(--border); border-radius: 4px;
    color: var(--text); font-size: 11px; text-align: center; outline: none;
  }
  .sb-page input:focus { border-color: var(--accent); }
  .sb-page-total { font-size: 9px; color: var(--muted); }
  .sb-zoom-label { font-size: 9px; color: var(--muted); text-align: center; line-height: 1; }

  /* MAIN SCROLL — no scrollbar */
  #viewer-scroll {
    position: fixed; top: 0; left: 0;
    right: var(--sidebar-w); bottom: 0;
    overflow-y: auto; overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    background: var(--bg);
    display: flex; flex-direction: column; align-items: center;
    padding: 24px 16px; gap: 16px;
    scroll-behavior: smooth;
    scrollbar-width: none;
  }
  #viewer-scroll::-webkit-scrollbar { display: none; }

  .canvas-wrap {
    position: relative; flex-shrink: 0;
    box-shadow: 0 4px 24px rgba(0,0,0,0.7);
    border-radius: 2px; overflow: hidden; background: #fff;
  }
  .canvas-wrap canvas { display: block; }

  /* watermark */
  .canvas-wrap::after {
    content: 'F(ORTH) · ORTHO TIMES';
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.9rem; font-weight: 700; letter-spacing: 0.15em;
    color: rgba(0,194,224,0.045); pointer-events: none;
    white-space: nowrap; transform: rotate(-30deg) scale(1.5);
    text-transform: uppercase; z-index: 10;
  }

  .page-badge {
    font-size: 10px; color: var(--muted);
    margin-top: -10px; margin-bottom: 8px; letter-spacing: 0.05em;
  }

  /* LOADING */
  #loading {
    display: flex; flex-direction: column; align-items: center;
    gap: 12px; padding: 80px 0; color: var(--muted);
  }
  .spinner {
    width: 28px; height: 28px; border: 2px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .load-text { font-size: 12px; }

  /* SEARCH */
  #search-bar {
    display: none; position: fixed; top: 12px; left: 12px; z-index: 200;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px; gap: 6px; align-items: center;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    width: min(340px, calc(100vw - var(--sidebar-w) - 24px));
  }
  #search-bar.visible { display: flex; }
  .search-input {
    flex: 1; background: rgba(255,255,255,0.05);
    border: 1px solid var(--border); border-radius: 5px;
    padding: 6px 10px; color: var(--text); font-size: 12px; outline: none; min-height: 32px;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-info { font-size: 10px; color: var(--muted); white-space: nowrap; }
  .search-nav-btn {
    background: none; border: 1px solid var(--border); color: var(--muted);
    padding: 4px 6px; border-radius: 4px; cursor: pointer; font-size: 11px; min-height: 28px;
    -webkit-tap-highlight-color: transparent;
  }
  .search-nav-btn:hover { color: var(--accent); border-color: var(--accent); }
  .search-close { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 14px; padding: 2px 4px; }
  .search-close:hover { color: var(--text); }

  #search-results-panel {
    display: none; position: fixed; top: 56px; left: 12px; z-index: 199;
    background: var(--surface); border: 1px solid var(--border); border-radius: 6px;
    width: min(320px, calc(100vw - var(--sidebar-w) - 24px));
    max-height: 200px; overflow-y: auto;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    scrollbar-width: none;
  }
  #search-results-panel::-webkit-scrollbar { display: none; }
  #search-results-panel .result-item {
    padding: 8px 12px; font-size: 11px; cursor: pointer;
    border-bottom: 1px solid var(--border); color: var(--muted);
    -webkit-tap-highlight-color: transparent;
  }
  #search-results-panel .result-item:hover { background: rgba(0,194,224,0.05); color: var(--text); }
  #search-results-panel .result-item .pg { color: var(--accent); font-weight: 700; margin-right: 6px; }

  .highlight-overlay {
    position: absolute; background: rgba(255,220,0,0.35);
    border: 1px solid rgba(255,200,0,0.6);
    pointer-events: none; z-index: 11; border-radius: 2px;
  }

  /* DEVTOOLS */
  #dt-warning {
    display: none; position: fixed; inset: 0; z-index: 9999;
    background: var(--bg); flex-direction: column; align-items: center;
    justify-content: center; gap: 12px; text-align: center; padding: 2rem;
  }
  #dt-warning h2 { font-size: 1.2rem; color: var(--accent); }
  #dt-warning p { color: var(--muted); max-width: 300px; line-height: 1.7; font-size: 0.85rem; }

  /* SCROLL-TO-TOP */
  #scroll-top {
    position: fixed; bottom: 20px; left: 20px;
    width: 32px; height: 32px; background: var(--surface);
    border: 1px solid var(--border); border-radius: 50%; color: var(--muted);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; cursor: pointer; opacity: 0; transition: opacity 0.2s;
    z-index: 50; -webkit-tap-highlight-color: transparent;
  }
  #scroll-top.visible { opacity: 1; }
  #scroll-top:hover { color: var(--accent); border-color: var(--accent); }

  @media (max-width: 600px) {
    :root { --sidebar-w: 44px; }
    #viewer-scroll { padding: 16px 8px; gap: 12px; }
  }
</style>
</head>
<body>

<div id="dt-warning">
  <h2>Access Paused</h2>
  <p>Developer tools detected. Please close DevTools to continue reading.</p>
</div>

<div id="search-bar">
  <input class="search-input" id="search-input" placeholder="Search…" oninput="doSearch(this.value)">
  <span class="search-info" id="search-info"></span>
  <button class="search-nav-btn" onclick="prevMatch()">↑</button>
  <button class="search-nav-btn" onclick="nextMatch()">↓</button>
  <button class="search-close" onclick="closeSearch()">✕</button>
</div>
<div id="search-results-panel"></div>

<div id="viewer-scroll">
  <div id="loading">
    <div class="spinner"></div>
    <p class="load-text">Loading…</p>
  </div>
</div>

<div id="scroll-top" onclick="document.getElementById('viewer-scroll').scrollTo({top:0,behavior:'smooth'})">↑</div>

<div id="sidebar">

  <button class="sb-btn" onclick="logout()" title="Sign out">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
    </svg>
  </button>

  <button class="sb-btn" id="fs-btn" onclick="toggleFullscreen()" title="Fullscreen">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>
    </svg>
  </button>

  <div class="sb-divider"></div>

  <button class="sb-btn" id="search-btn" onclick="toggleSearch()" title="Search">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
  </button>

  <div class="sb-divider"></div>

  <button class="sb-btn" onclick="zoomOut()" title="Zoom out">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/>
    </svg>
  </button>

  <div class="sb-zoom-label" id="zoom-label">100%</div>

  <button class="sb-btn" onclick="zoomIn()" title="Zoom in">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/>
    </svg>
  </button>

  <button class="sb-btn" onclick="fitWidth()" title="Fit width">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="15 3 21 3 21 9"/><polyline points="9 3 3 3 3 9"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="3" x2="10" y2="10"/>
      <polyline points="15 21 21 21 21 15"/><polyline points="9 21 3 21 3 15"/>
    </svg>
  </button>

  <div class="sb-spacer"></div>

  <button class="sb-btn" id="btn-prev" onclick="goPrev()" title="Previous page">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="15 18 9 12 15 6"/>
    </svg>
  </button>

  <div class="sb-page">
    <input type="number" id="page-input" min="1" value="1"
      onchange="goToPage(this.value)"
      onkeydown="if(event.key==='Enter')this.blur();">
    <span class="sb-page-total" id="page-total">/ —</span>
  </div>

  <button class="sb-btn" id="btn-next" onclick="goNext()" title="Next page">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="9 18 15 12 9 6"/>
    </svg>
  </button>

</div>

<script>
// ── SUPABASE — init before everything ──
const SUPA_URL = 'https://djbiatgxjmvwfcimofjt.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRqYmlhdGd4am12d2ZjaW1vZmp0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2NjU1MjcsImV4cCI6MjA5MDI0MTUyN30.m_gBey_jA13hVdjttSKtFMcrQO-dGokq1Fpu2XriLp0';
const sb = window.supabase.createClient(SUPA_URL, SUPA_KEY);

// ── LOGOUT — awaits signOut fully, then replaces history so back button can't loop ──
async function logout() {
  localStorage.removeItem('vaultdocs_session');
  try { await sb.auth.signOut(); } catch(e) {}
  window.location.replace('index.html');
}

// ── PROTECTIONS ──
document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('keydown', e => {
  const blocked = [
    e.ctrlKey && ['c','a','s','p','u'].includes(e.key.toLowerCase()),
    e.metaKey && ['c','a','s','p','u'].includes(e.key.toLowerCase()),
    e.key === 'PrintScreen', e.key === 'F12',
    e.ctrlKey && e.shiftKey && ['i','j','c'].includes(e.key.toLowerCase()),
  ];
  if (blocked.some(Boolean)) { e.preventDefault(); e.stopPropagation(); return false; }
});
document.addEventListener('copy', e => e.preventDefault());
document.addEventListener('cut', e => e.preventDefault());
document.addEventListener('dragstart', e => e.preventDefault());
window.addEventListener('beforeprint', e => { e.preventDefault(); window.stop(); });

const dtWarning = document.getElementById('dt-warning');
let devToolsOpen = false;
setInterval(() => {
  const open = window.outerWidth - window.innerWidth > 160 || window.outerHeight - window.innerHeight > 160;
  if (open !== devToolsOpen) { devToolsOpen = open; dtWarning.style.display = open ? 'flex' : 'none'; }
}, 1000);

// ── PDF.JS ──
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

let pdfDoc = null, currentPage = 1, totalPages = 0;
let scale = 1.0;
let searchMatches = [], searchMatchIndex = 0, pageTextCache = {};
let renderedPages = new Set();

const scroll = document.getElementById('viewer-scroll');

scroll.addEventListener('scroll', () => {
  document.getElementById('scroll-top').classList.toggle('visible', scroll.scrollTop > 400);
  updateCurrentPageFromScroll();
}, { passive: true });

function updateCurrentPageFromScroll() {
  const wraps = scroll.querySelectorAll('.canvas-wrap');
  const scrollMid = scroll.scrollTop + scroll.clientHeight / 2;
  let closest = null, minDist = Infinity;
  wraps.forEach(w => {
    const center = w.offsetTop + w.offsetHeight / 2;
    const dist = Math.abs(center - scrollMid);
    if (dist < minDist) { minDist = dist; closest = w; }
  });
  if (closest) {
    const pn = parseInt(closest.dataset.pageNum);
    if (pn !== currentPage) {
      currentPage = pn;
      document.getElementById('page-input').value = currentPage;
      updateNav();
    }
  }
}

async function loadPDF() {
  try {
    document.querySelector('.load-text').textContent = 'Fetching…';
    const response = await fetch('book.pdf');
    const arrayBuffer = await response.arrayBuffer();
    document.querySelector('.load-text').textContent = 'Rendering…';
    pdfDoc = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
    totalPages = pdfDoc.numPages;
    document.getElementById('page-total').textContent = '/ ' + totalPages;
    document.getElementById('page-input').max = totalPages;
    document.getElementById('loading').style.display = 'none';

    if (window.innerWidth < 768) fitWidth();
    else autoScale();

    await renderAllPages();
  } catch(e) {
    document.querySelector('.load-text').textContent = 'Error: ' + e.message;
  }
}

async function renderAllPages() {
  scroll.querySelectorAll('.canvas-wrap, .page-badge').forEach(el => el.remove());
  renderedPages.clear();

  for (let p = 1; p <= totalPages; p++) {
    await renderCanvasInto(p, scroll);
    const badge = document.createElement('div');
    badge.className = 'page-badge';
    badge.textContent = String(p);
    scroll.appendChild(badge);
  }
  updateNav();
}

function isMobile() { return window.innerWidth < 768; }

async function renderCanvasInto(num, container) {
  const page = await pdfDoc.getPage(num);
  const viewport = page.getViewport({ scale });
  const div = document.createElement('div');
  div.className = 'canvas-wrap';
  div.dataset.pageNum = num;
  const canvas = document.createElement('canvas');
  canvas.width = viewport.width;
  canvas.height = viewport.height;
  div.style.width = viewport.width + 'px';
  div.style.height = viewport.height + 'px';
  div.appendChild(canvas);
  container.appendChild(div);
  await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
  renderedPages.add(num);
  if (!pageTextCache[num]) {
    const tc = await page.getTextContent();
    pageTextCache[num] = { items: tc.items, viewport };
  }
}

function updateNav() {
  document.getElementById('page-input').value = currentPage;
  document.getElementById('btn-prev').disabled = currentPage <= 1;
  document.getElementById('btn-next').disabled = currentPage >= totalPages;
  document.getElementById('zoom-label').textContent = Math.round(scale * 100) + '%';
}

function scrollToPage(num) {
  num = Math.max(1, Math.min(totalPages, num));
  currentPage = num;
  const pageEl = scroll.querySelector(`[data-page-num="${num}"]`);
  if (pageEl) pageEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
  updateNav();
}

function goPrev() { scrollToPage(currentPage - 1); }
function goNext() { scrollToPage(currentPage + 1); }
function goToPage(n) { scrollToPage(parseInt(n) || 1); }

function applyZoom(pct) {
  pct = Math.max(25, Math.min(300, pct));
  scale = pct / 100;
  document.getElementById('zoom-label').textContent = pct + '%';
  if (pdfDoc) renderAllPages().then(() => scrollToPage(currentPage));
}
function zoomIn() { applyZoom(Math.round(scale * 100) + 10); }
function zoomOut() { applyZoom(Math.round(scale * 100) - 10); }

function fitWidth() {
  const availW = scroll.clientWidth - 32;
  applyZoom(Math.round((availW / 612) * 100));
}
function autoScale() {
  const availW = scroll.clientWidth - 32;
  applyZoom(Math.min(100, Math.round((availW / 612) * 100)));
}

window.addEventListener('orientationchange', () => { setTimeout(() => { if (pdfDoc) fitWidth(); }, 300); });
window.addEventListener('resize', () => { if (pdfDoc && isMobile()) fitWidth(); });

function toggleFullscreen() {
  const el = document.documentElement;
  if (!document.fullscreenElement && !document.webkitFullscreenElement) {
    if (el.requestFullscreen) el.requestFullscreen();
    else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
  } else {
    if (document.exitFullscreen) document.exitFullscreen();
    else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
  }
}

function toggleSearch() {
  const bar = document.getElementById('search-bar');
  const visible = bar.classList.toggle('visible');
  document.getElementById('search-btn').classList.toggle('active', visible);
  if (visible) document.getElementById('search-input').focus();
  else closeSearch();
}

function closeSearch() {
  document.getElementById('search-bar').classList.remove('visible');
  document.getElementById('search-btn').classList.remove('active');
  document.getElementById('search-input').value = '';
  document.getElementById('search-info').textContent = '';
  document.getElementById('search-results-panel').style.display = 'none';
  document.getElementById('search-results-panel').innerHTML = '';
  clearHighlights();
  searchMatches = []; searchMatchIndex = 0;
}

async function doSearch(query) {
  clearHighlights(); searchMatches = [];
  const panel = document.getElementById('search-results-panel');
  if (!query || query.length < 2) {
    document.getElementById('search-info').textContent = '';
    panel.style.display = 'none'; panel.innerHTML = ''; return;
  }
  document.getElementById('search-info').textContent = '…';
  const lq = query.toLowerCase();
  for (let p = 1; p <= totalPages; p++) {
    if (!pageTextCache[p]) {
      const page = await pdfDoc.getPage(p);
      const tc = await page.getTextContent();
      pageTextCache[p] = { items: tc.items, viewport: page.getViewport({ scale }) };
    }
    if (pageTextCache[p].items.map(i => i.str).join(' ').toLowerCase().includes(lq)) searchMatches.push(p);
  }
  if (!searchMatches.length) {
    document.getElementById('search-info').textContent = 'Not found';
    panel.style.display = 'none'; return;
  }
  document.getElementById('search-info').textContent = searchMatches.length + 'pg';
  searchMatchIndex = 0;
  panel.innerHTML = searchMatches.map(pg => {
    const snippet = pageTextCache[pg].items.map(i => i.str).join(' ');
    const idx = snippet.toLowerCase().indexOf(lq);
    const preview = snippet.substring(Math.max(0, idx - 15), idx + 35).trim();
    return `<div class="result-item" onclick="jumpToMatch(${pg})"><span class="pg">P.${pg}</span>${preview}…</div>`;
  }).join('');
  panel.style.display = 'block';
  jumpToMatch(searchMatches[0]);
}

function jumpToMatch(pg) {
  scrollToPage(pg);
  setTimeout(() => highlightOnPage(pg, document.getElementById('search-input').value), 400);
}

function highlightOnPage(pageNum, query) {
  clearHighlights();
  const pageEl = scroll.querySelector(`[data-page-num="${pageNum}"]`);
  if (!pageEl || !pageTextCache[pageNum]) return;
  const lq = query.toLowerCase();
  const { items } = pageTextCache[pageNum];
  const canvas = pageEl.querySelector('canvas');
  const h = canvas ? canvas.height : 0;
  items.forEach(item => {
    if (!item.str.toLowerCase().includes(lq)) return;
    const hl = document.createElement('div');
    hl.className = 'highlight-overlay';
    hl.style.left = (item.transform[4] * scale) + 'px';
    hl.style.top = (h - item.transform[5] * scale - item.height * scale) + 'px';
    hl.style.width = (item.width * scale) + 'px';
    hl.style.height = Math.max(item.height * scale, 10) + 'px';
    pageEl.appendChild(hl);
  });
}

function clearHighlights() { document.querySelectorAll('.highlight-overlay').forEach(el => el.remove()); }
function prevMatch() { if (!searchMatches.length) return; searchMatchIndex = (searchMatchIndex - 1 + searchMatches.length) % searchMatches.length; jumpToMatch(searchMatches[searchMatchIndex]); }
function nextMatch() { if (!searchMatches.length) return; searchMatchIndex = (searchMatchIndex + 1) % searchMatches.length; jumpToMatch(searchMatches[searchMatchIndex]); }

document.addEventListener('keydown', e => {
  const active = document.activeElement;
  if (['search-input','page-input'].includes(active.id)) return;
  if (e.key === 'ArrowDown' || e.key === 'ArrowRight') { e.preventDefault(); goNext(); }
  if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') { e.preventDefault(); goPrev(); }
  if (e.key === 'Escape') closeSearch();
  if (e.key === 'f') toggleFullscreen();
  if (e.key === '+' || e.key === '=') zoomIn();
  if (e.key === '-') zoomOut();
});

// ── AUTH ──
(async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    const { data: profile } = await sb.from('profiles').select('approved').eq('id', session.user.id).single();
    if (profile?.approved) {
      localStorage.setItem('vaultdocs_session', session.access_token);
      loadPDF();
      return;
    }
    await sb.auth.signOut();
  }
  localStorage.removeItem('vaultdocs_session');
  window.location.replace('index.html');
})();
</script>
