<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>F(Orth) Part B — Study Notes Viewer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
<style>
:root {
  --navy: #0f1535; --navy-mid: #1a2550;
  --cyan: #00c2e0; --white: #f5f7ff;
  --muted: #8a9bc4; --border: rgba(0,194,224,0.2);
  --green: #00e0a0;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--navy); color: var(--white);
  font-family: 'Segoe UI', system-ui, sans-serif;
  user-select: none; -webkit-user-select: none; -moz-user-select: none;
}
body::before {
  content: ''; position: fixed; inset: 0;
  background-image: linear-gradient(rgba(0,194,224,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,194,224,0.03) 1px, transparent 1px);
  background-size: 60px 60px; pointer-events: none; z-index: 0;
}

/* TOPBAR */
.topbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0.65rem 1.5rem;
  background: rgba(15,21,53,0.97); backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
}
.topbar-brand { font-size: 0.75rem; font-weight: 700; color: var(--cyan); letter-spacing: 0.1em; text-transform: uppercase; }
.topbar-right { display: flex; align-items: center; gap: 1rem; }
.page-info { font-size: 0.78rem; color: var(--muted); }
.icon-btn {
  background: transparent; border: 1px solid var(--border);
  color: var(--muted); font-size: 0.82rem; padding: 0.35rem 0.8rem;
  border-radius: 4px; cursor: pointer; transition: all 0.2s; white-space: nowrap;
}
.icon-btn:hover { border-color: var(--cyan); color: var(--cyan); }
.icon-btn.active { background: rgba(0,194,224,0.15); border-color: var(--cyan); color: var(--cyan); }

/* TOOLBAR */
.toolbar {
  position: fixed; top: 48px; left: 0; right: 0; z-index: 99;
  display: flex; align-items: center; justify-content: center; gap: 0.5rem;
  padding: 0.5rem 1rem; flex-wrap: wrap;
  background: rgba(26,37,80,0.97); backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
}
.tb-btn {
  background: rgba(0,194,224,0.08); border: 1px solid var(--border);
  color: var(--white); font-size: 0.78rem; padding: 0.35rem 0.8rem;
  border-radius: 5px; cursor: pointer; transition: all 0.2s; white-space: nowrap;
}
.tb-btn:hover { background: rgba(0,194,224,0.18); border-color: var(--cyan); }
.tb-btn.active { background: rgba(0,194,224,0.2); border-color: var(--cyan); color: var(--cyan); }
.tb-divider { width: 1px; height: 22px; background: var(--border); flex-shrink: 0; }
.zoom-label { font-size: 0.78rem; color: var(--muted); min-width: 44px; text-align: center; }

/* SEARCH BAR */
.search-bar {
  display: none;
  position: fixed; top: 96px; left: 50%; transform: translateX(-50%);
  z-index: 98; width: 100%; max-width: 500px; padding: 0 1rem;
}
.search-bar.visible { display: flex; gap: 0.5rem; align-items: center; }
.search-input {
  flex: 1; background: rgba(15,21,53,0.95); border: 1px solid var(--cyan);
  border-radius: 6px; padding: 0.5rem 1rem; color: var(--white);
  font-size: 0.85rem; outline: none; font-family: inherit;
}
.search-input::placeholder { color: var(--muted); }
.search-info { font-size: 0.75rem; color: var(--muted); white-space: nowrap; }
.search-nav-btn {
  background: rgba(0,194,224,0.1); border: 1px solid var(--border);
  color: var(--white); padding: 0.35rem 0.6rem; border-radius: 4px;
  cursor: pointer; font-size: 0.8rem; transition: all 0.2s;
}
.search-nav-btn:hover { border-color: var(--cyan); }
.search-close {
  background: none; border: none; color: var(--muted);
  cursor: pointer; font-size: 1rem; padding: 0.2rem 0.4rem;
}

/* VIEWER */
#viewer-wrap {
  position: relative; z-index: 1;
  margin-top: 96px; padding: 1.5rem 1rem 5rem;
  display: flex; flex-direction: row; justify-content: center;
  align-items: flex-start; gap: 1rem; min-height: calc(100vh - 96px);
  flex-wrap: wrap;
}
#viewer-wrap.has-search { margin-top: 136px; }

#loading {
  display: flex; flex-direction: column; align-items: center; gap: 1rem;
  padding: 6rem 2rem; color: var(--muted); width: 100%; justify-content: center;
}
.spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--cyan); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.load-text { font-size: 0.85rem; }

.canvas-wrap {
  position: relative; margin: 0;
  box-shadow: 0 16px 48px rgba(0,0,0,0.6);
  border: 1px solid var(--border); border-radius: 4px;
  overflow: hidden; display: block; flex-shrink: 0;
}
.canvas-wrap canvas { display: block; }
.canvas-wrap::after {
  content: 'F(ORTH) PART B EASY STUDY NOTES · ORTHO TIMES · M.B. MEKKI';
  position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
  font-size: 1rem; font-weight: 700; letter-spacing: 0.2em;
  color: rgba(0,194,224,0.06); pointer-events: none;
  white-space: nowrap; overflow: hidden;
  transform: rotate(-30deg) scale(1.5); text-transform: uppercase; z-index: 10;
}

/* SEARCH HIGHLIGHT OVERLAY */
.highlight-overlay {
  position: absolute; background: rgba(255,220,0,0.35);
  border: 1px solid rgba(255,200,0,0.6); pointer-events: none; z-index: 11;
  border-radius: 2px;
}

/* PAGE NAV */
.page-nav {
  position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
  display: flex; align-items: center; gap: 0.8rem; z-index: 100;
  background: rgba(15,21,53,0.97); backdrop-filter: blur(12px);
  border: 1px solid var(--border); border-radius: 50px;
  padding: 0.5rem 1.2rem;
}
.nav-btn { background: none; border: none; color: var(--white); font-size: 1rem; cursor: pointer; padding: 0.2rem 0.4rem; border-radius: 4px; transition: color 0.2s; }
.nav-btn:hover { color: var(--cyan); }
.nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.page-input { width: 44px; text-align: center; background: transparent; border: none; border-bottom: 1px solid var(--border); color: var(--white); font-size: 0.82rem; padding: 0.1rem 0.2rem; outline: none; }
.page-input:focus { border-bottom-color: var(--cyan); }
.page-total { font-size: 0.8rem; color: var(--muted); }

/* FULLSCREEN */
:fullscreen body::before { display: none; }
:fullscreen .topbar, :fullscreen .toolbar, :fullscreen .page-nav, :fullscreen .search-bar { position: fixed; }

/* DEVTOOLS */
#dt-warning { display: none; position: fixed; inset: 0; z-index: 9999; background: var(--navy); flex-direction: column; align-items: center; justify-content: center; gap: 1rem; text-align: center; }
#dt-warning h2 { font-size: 1.6rem; color: var(--cyan); }
#dt-warning p { color: var(--muted); max-width: 400px; line-height: 1.7; }

/* SEARCH RESULTS PANEL */
#search-results-panel {
  display: none; position: fixed; top: 136px; right: 1rem;
  z-index: 97; background: rgba(15,21,53,0.97);
  border: 1px solid var(--border); border-radius: 8px;
  width: 220px; max-height: 300px; overflow-y: auto;
  backdrop-filter: blur(12px);
}
#search-results-panel .result-item {
  padding: 0.6rem 1rem; font-size: 0.78rem; cursor: pointer;
  border-bottom: 1px solid rgba(255,255,255,0.05); color: var(--muted);
  transition: background 0.15s;
}
#search-results-panel .result-item:hover { background: rgba(0,194,224,0.1); color: var(--white); }
#search-results-panel .result-item .pg { color: var(--cyan); font-weight: 700; margin-right: 0.4rem; }
</style>
</head>
<body>

<div id="dt-warning">
  <h2>⚠ Access Paused</h2>
  <p>Developer tools detected. Please close DevTools to continue reading.</p>
</div>

<!-- TOPBAR -->
<div class="topbar">
  <span class="topbar-brand">F(Orth) Part B · Easy Study Notes</span>
  <div class="topbar-right">
    <span class="page-info" id="top-page-info">Loading…</span>
    <button class="icon-btn" onclick="toggleFullscreen()" id="fs-btn">⛶ Fullscreen</button>
    <button class="icon-btn" onclick="logout()">↩ Sign Out</button>
  </div>
</div>

<!-- TOOLBAR -->
<div class="toolbar">
  <button class="tb-btn" onclick="zoomOut()">− Zoom</button>
  <span class="zoom-label" id="zoom-label">150%</span>
  <button class="tb-btn" onclick="zoomIn()">+ Zoom</button>
  <div class="tb-divider"></div>
  <button class="tb-btn" onclick="fitWidth()">⟷ Width</button>
  <button class="tb-btn" onclick="fitPage()">⛶ Page</button>
  <div class="tb-divider"></div>
  <button class="tb-btn" id="dual-btn" onclick="toggleDualPage()">⊞ Dual Page</button>
  <div class="tb-divider"></div>
  <button class="tb-btn" onclick="toggleSearch()" id="search-btn">🔍 Search</button>
</div>

<!-- SEARCH BAR -->
<div class="search-bar" id="search-bar">
  <input class="search-input" id="search-input" placeholder="Search text in document…" oninput="doSearch(this.value)">
  <span class="search-info" id="search-info"></span>
  <button class="search-nav-btn" onclick="prevMatch()">↑</button>
  <button class="search-nav-btn" onclick="nextMatch()">↓</button>
  <button class="search-close" onclick="closeSearch()">✕</button>
</div>

<div id="search-results-panel"></div>

<!-- VIEWER -->
<div id="viewer-wrap">
  <div id="loading">
    <div class="spinner"></div>
    <p class="load-text">Loading your study notes…</p>
  </div>
</div>

<!-- PAGE NAV -->
<div class="page-nav">
  <button class="nav-btn" id="btn-first" onclick="goFirst()">⟪</button>
  <button class="nav-btn" id="btn-prev" onclick="goPrev()">‹</button>
  <input class="page-input" id="page-input" type="number" min="1" value="1" onchange="goToPage(this.value)">
  <span class="page-total" id="page-total">/ —</span>
  <button class="nav-btn" id="btn-next" onclick="goNext()">›</button>
  <button class="nav-btn" id="btn-last" onclick="goLast()">⟫</button>
</div>

<script>
// ── PROTECTIONS ──
document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('keydown', e => {
  const blocked = [
    e.ctrlKey && ['c','a','s','p','u'].includes(e.key.toLowerCase()),
    e.metaKey && ['c','a','s','p','u'].includes(e.key.toLowerCase()),
    e.key === 'PrintScreen', e.key === 'F12',
    e.ctrlKey && e.shiftKey && ['i','j','c'].includes(e.key.toLowerCase()),
  ];
  if (blocked.some(Boolean)) { e.preventDefault(); e.stopPropagation(); return false; }
});
document.addEventListener('copy', e => e.preventDefault());
document.addEventListener('cut', e => e.preventDefault());
document.addEventListener('dragstart', e => e.preventDefault());
window.addEventListener('beforeprint', e => { e.preventDefault(); window.stop(); });

const dtWarning = document.getElementById('dt-warning');
let devToolsOpen = false;
setInterval(() => {
  const open = window.outerWidth - window.innerWidth > 160 || window.outerHeight - window.innerHeight > 160;
  if (open !== devToolsOpen) { devToolsOpen = open; dtWarning.style.display = open ? 'flex' : 'none'; }
}, 1000);

// ── PDF.JS ──
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

let pdfDoc = null, currentPage = 1, totalPages = 0;
let scale = 1.5, rendering = false, renderQueue = null;
let dualPage = false;
let searchMatches = [], searchMatchIndex = 0, pageTextCache = {};

// ── LOAD ──
async function loadPDF() {
  try {
    document.querySelector('.load-text').textContent = 'Fetching…';
    const response = await fetch('book.pdf');
    const arrayBuffer = await response.arrayBuffer();
    document.querySelector('.load-text').textContent = 'Rendering…';
    pdfDoc = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
    totalPages = pdfDoc.numPages;
    document.getElementById('page-total').textContent = '/ ' + totalPages;
    document.getElementById('loading').style.display = 'none';
    renderPage(1);
  } catch(e) {
    document.querySelector('.load-text').textContent = 'Error: ' + e.message;
  }
}

// ── RENDER ──
async function renderPage(num) {
  if (rendering) { renderQueue = num; return; }
  rendering = true; currentPage = num; updateNav();

  const wrap = document.getElementById('viewer-wrap');
  wrap.querySelectorAll('.canvas-wrap').forEach(el => el.remove());

  if (dualPage) {
    await renderSingleCanvas(num, wrap);
    if (num + 1 <= totalPages) await renderSingleCanvas(num + 1, wrap);
  } else {
    await renderSingleCanvas(num, wrap);
  }

  rendering = false;
  if (renderQueue !== null) { const next = renderQueue; renderQueue = null; renderPage(next); }
}

async function renderSingleCanvas(num, wrap) {
  const page = await pdfDoc.getPage(num);
  const viewport = page.getViewport({ scale });
  const div = document.createElement('div');
  div.className = 'canvas-wrap'; div.dataset.pageNum = num;
  const canvas = document.createElement('canvas');
  canvas.width = viewport.width; canvas.height = viewport.height;
  div.style.width = viewport.width + 'px'; div.style.height = viewport.height + 'px';
  div.appendChild(canvas); wrap.appendChild(div);
  await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;

  // Cache text for search
  if (!pageTextCache[num]) {
    const textContent = await page.getTextContent();
    pageTextCache[num] = { items: textContent.items, viewport };
  }
}

function updateNav() {
  document.getElementById('page-input').value = currentPage;
  const displayPage = dualPage ? `${currentPage}–${Math.min(currentPage+1, totalPages)}` : currentPage;
  document.getElementById('top-page-info').textContent = `Page ${displayPage} of ${totalPages}`;
  document.getElementById('btn-prev').disabled = currentPage <= 1;
  document.getElementById('btn-first').disabled = currentPage <= 1;
  document.getElementById('btn-next').disabled = dualPage ? currentPage + 2 > totalPages : currentPage >= totalPages;
  document.getElementById('btn-last').disabled = currentPage >= totalPages;
  document.getElementById('zoom-label').textContent = Math.round(scale * 100) + '%';
}

function goPrev() { if (currentPage > 1) renderPage(dualPage ? Math.max(1, currentPage - 2) : currentPage - 1); }
function goNext() {
  const next = dualPage ? currentPage + 2 : currentPage + 1;
  if (next <= totalPages) renderPage(next);
}
function goFirst() { renderPage(1); }
function goLast() { renderPage(totalPages); }
function goToPage(n) { renderPage(Math.max(1, Math.min(totalPages, parseInt(n) || 1))); }
function zoomIn() { scale = Math.min(3, scale + 0.25); renderPage(currentPage); }
function zoomOut() { scale = Math.max(0.5, scale - 0.25); renderPage(currentPage); }
function fitWidth() { scale = dualPage ? (window.innerWidth - 120) / (612 * 2) : (window.innerWidth - 80) / 612; renderPage(currentPage); }
function fitPage() { scale = 1.5; renderPage(currentPage); }

// ── DUAL PAGE ──
function toggleDualPage() {
  dualPage = !dualPage;
  document.getElementById('dual-btn').classList.toggle('active', dualPage);
  document.getElementById('dual-btn').textContent = dualPage ? '▣ Single Page' : '⊞ Dual Page';
  renderPage(currentPage);
}

// ── FULLSCREEN ──
function toggleFullscreen() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen();
    document.getElementById('fs-btn').textContent = '✕ Exit Fullscreen';
  } else {
    document.exitFullscreen();
    document.getElementById('fs-btn').textContent = '⛶ Fullscreen';
  }
}
document.addEventListener('fullscreenchange', () => {
  if (!document.fullscreenElement) document.getElementById('fs-btn').textContent = '⛶ Fullscreen';
});

// ── SEARCH ──
function toggleSearch() {
  const bar = document.getElementById('search-bar');
  const wrap = document.getElementById('viewer-wrap');
  const btn = document.getElementById('search-btn');
  const visible = bar.classList.toggle('visible');
  btn.classList.toggle('active', visible);
  wrap.classList.toggle('has-search', visible);
  if (visible) {
    document.getElementById('search-input').focus();
  } else {
    closeSearch();
  }
}

function closeSearch() {
  document.getElementById('search-bar').classList.remove('visible');
  document.getElementById('search-btn').classList.remove('active');
  document.getElementById('viewer-wrap').classList.remove('has-search');
  document.getElementById('search-input').value = '';
  document.getElementById('search-info').textContent = '';
  document.getElementById('search-results-panel').style.display = 'none';
  document.getElementById('search-results-panel').innerHTML = '';
  clearHighlights();
  searchMatches = []; searchMatchIndex = 0;
}

async function doSearch(query) {
  clearHighlights();
  searchMatches = [];
  const panel = document.getElementById('search-results-panel');
  if (!query || query.length < 2) {
    document.getElementById('search-info').textContent = '';
    panel.style.display = 'none'; panel.innerHTML = '';
    return;
  }

  document.getElementById('search-info').textContent = 'Searching…';

  // Search all pages
  const lq = query.toLowerCase();
  const results = [];
  for (let p = 1; p <= totalPages; p++) {
    if (!pageTextCache[p]) {
      const page = await pdfDoc.getPage(p);
      const textContent = await page.getTextContent();
      const viewport = page.getViewport({ scale });
      pageTextCache[p] = { items: textContent.items, viewport };
    }
    const text = pageTextCache[p].items.map(i => i.str).join(' ').toLowerCase();
    if (text.includes(lq)) {
      results.push(p);
      searchMatches.push(p);
    }
  }

  if (!results.length) {
    document.getElementById('search-info').textContent = 'Not found';
    panel.style.display = 'none'; return;
  }

  document.getElementById('search-info').textContent = `${results.length} page${results.length > 1 ? 's' : ''}`;
  searchMatchIndex = 0;

  // Show results panel
  panel.innerHTML = results.map(pg => {
    const snippet = pageTextCache[pg].items.map(i => i.str).join(' ');
    const idx = snippet.toLowerCase().indexOf(lq);
    const preview = snippet.substring(Math.max(0, idx - 20), idx + 40).trim();
    return `<div class="result-item" onclick="goToPage(${pg})"><span class="pg">P.${pg}</span>${preview}…</div>`;
  }).join('');
  panel.style.display = 'block';

  // Go to first match and highlight
  goToPage(results[0]);
  setTimeout(() => highlightOnPage(results[0], query), 600);
}

function highlightOnPage(pageNum, query) {
  const wrap = document.getElementById('viewer-wrap');
  const pageDiv = wrap.querySelector(`[data-page-num="${pageNum}"]`);
  if (!pageDiv || !pageTextCache[pageNum]) return;
  clearHighlights();
  const lq = query.toLowerCase();
  const { items, viewport } = pageTextCache[pageNum];
  items.forEach(item => {
    if (item.str.toLowerCase().includes(lq)) {
      const tx = pdfjsLib.Util.transform(viewport.transform, item.transform);
      const highlight = document.createElement('div');
      highlight.className = 'highlight-overlay';
      highlight.style.left = tx[4] + 'px';
      highlight.style.top = (viewport.height - tx[5] - item.height * scale) + 'px';
      highlight.style.width = (item.width * scale) + 'px';
      highlight.style.height = (item.height * scale + 4) + 'px';
      pageDiv.appendChild(highlight);
    }
  });
}

function clearHighlights() {
  document.querySelectorAll('.highlight-overlay').forEach(el => el.remove());
}

function prevMatch() {
  if (!searchMatches.length) return;
  searchMatchIndex = (searchMatchIndex - 1 + searchMatches.length) % searchMatches.length;
  const pg = searchMatches[searchMatchIndex];
  goToPage(pg);
  setTimeout(() => highlightOnPage(pg, document.getElementById('search-input').value), 600);
}

function nextMatch() {
  if (!searchMatches.length) return;
  searchMatchIndex = (searchMatchIndex + 1) % searchMatches.length;
  const pg = searchMatches[searchMatchIndex];
  goToPage(pg);
  setTimeout(() => highlightOnPage(pg, document.getElementById('search-input').value), 600);
}

// ── KEYBOARD ──
document.addEventListener('keydown', e => {
  if (document.getElementById('search-input') === document.activeElement) return;
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') goNext();
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') goPrev();
  if (e.key === 'Escape') closeSearch();
});

// ── LOGOUT ──
async function logout() {
  localStorage.removeItem('vaultdocs_session');
  try {
    const sb = window.supabase.createClient(
      'https://djbiatgxjmvwfcimofjt.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRqYmlhdGd4am12d2ZjaW1vZmp0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2NjU1MjcsImV4cCI6MjA5MDI0MTUyN30.m_gBey_jA13hVdjttSKtFMcrQO-dGokq1Fpu2XriLp0'
    );
    await sb.auth.signOut();
  } catch(e) {}
  window.location.href = 'index.html';
}

// ── AUTH CHECK ──
if (!localStorage.getItem('vaultdocs_session')) {
  window.location.href = 'index.html';
} else {
  loadPDF();
}
</script>
</body>
</html>
