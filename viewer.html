<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>F(Orth) Part B — Study Notes</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
<style>
:root {
  --cyan: #00c2e0;
  --bar-h: 58px;
  /* dark mode (default) */
  --bg: #111827;
  --bar-bg: rgba(10,14,35,0.97);
  --bar-border: rgba(0,194,224,0.18);
  --btn-bg: rgba(0,194,224,0.07);
  --btn-color: #f5f7ff;
  --muted: #8a9bc4;
  --input-bg: rgba(26,37,80,0.9);
  --search-bg: rgba(15,21,53,0.97);
  --search-border: rgba(0,194,224,0.18);
}
html.light {
  --bg: #e8eaf0;
  --bar-bg: rgba(240,242,248,0.98);
  --bar-border: rgba(0,150,180,0.2);
  --btn-bg: rgba(0,150,180,0.07);
  --btn-color: #1a2550;
  --muted: #5a6a8a;
  --input-bg: rgba(210,215,230,0.9);
  --search-bg: rgba(240,242,248,0.98);
  --search-border: rgba(0,150,180,0.2);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; background: var(--bg); }
body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  user-select: none; -webkit-user-select: none;
  transition: background 0.2s;
}

/* ── VIEWER AREA ── */
#viewer-scroll {
  position: fixed;
  inset: 0;
  bottom: var(--bar-h);
  overflow: auto;
  -webkit-overflow-scrolling: touch;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  background: var(--bg);
  touch-action: pan-x pan-y pinch-zoom;
  transition: background 0.2s;
}

#viewer-wrap {
  display: flex;
  flex-direction: row;
  justify-content: center;
  align-items: flex-start;
  gap: 8px;
  padding: 16px;
  transform-origin: top center;
}

/* ── LOADING ── */
#loading {
  display: flex; flex-direction: column; align-items: center;
  gap: 1rem; padding: 5rem 2rem; color: var(--muted); width: 100%;
}
.spinner {
  width: 36px; height: 36px;
  border: 3px solid rgba(0,194,224,0.2);
  border-top-color: var(--cyan);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.load-text { font-size: 0.85rem; color: var(--muted); }

/* ── CANVAS WRAP ── */
.canvas-wrap {
  position: relative;
  flex-shrink: 0;
  box-shadow: 0 4px 24px rgba(0,0,0,0.6);
  border-radius: 3px;
  overflow: hidden;
  background: #fff;
}
.canvas-wrap canvas { display: block; }

/* ── USER STAMP (bottom-right corner of each page) ── */
.user-stamp {
  position: absolute;
  bottom: 8px;
  right: 10px;
  font-size: 0.55rem;
  color: rgba(80,80,80,0.35);
  font-family: monospace;
  pointer-events: none;
  z-index: 10;
  letter-spacing: 0.02em;
  white-space: nowrap;
}

/* ── SEARCH HIGHLIGHT ── */
.highlight-overlay {
  position: absolute;
  background: rgba(255,220,0,0.38);
  border: 1px solid rgba(255,200,0,0.6);
  pointer-events: none;
  z-index: 11;
  border-radius: 2px;
}

/* ── SEARCH RESULTS PANEL ── */
#search-results-panel {
  display: none;
  position: fixed;
  bottom: calc(var(--bar-h) + 8px);
  left: 50%; transform: translateX(-50%);
  z-index: 97;
  background: var(--search-bg);
  border: 1px solid var(--search-border);
  border-radius: 10px;
  width: min(300px, 88vw);
  max-height: 220px;
  overflow-y: auto;
  backdrop-filter: blur(12px);
}
#search-results-panel .result-item {
  padding: 0.5rem 0.8rem;
  font-size: 0.72rem;
  cursor: pointer;
  border-bottom: 1px solid var(--search-border);
  color: var(--muted);
  -webkit-tap-highlight-color: transparent;
}
#search-results-panel .result-item:active { background: rgba(0,194,224,0.1); }
#search-results-panel .result-item .pg { color: var(--cyan); font-weight: 700; margin-right: 0.3rem; }

/* ── SEARCH BAR (floating above bottom bar) ── */
#search-bar {
  display: none;
  position: fixed;
  bottom: calc(var(--bar-h) + 4px);
  left: 50%; transform: translateX(-50%);
  width: min(360px, 92vw);
  z-index: 98;
  background: var(--search-bg);
  border: 1px solid var(--search-border);
  border-radius: 10px;
  padding: 0.4rem 0.5rem;
  gap: 0.4rem;
  align-items: center;
  backdrop-filter: blur(12px);
}
#search-bar.visible { display: flex; }
.search-input {
  flex: 1;
  background: var(--input-bg);
  border: 1px solid var(--cyan);
  border-radius: 6px;
  padding: 0.35rem 0.7rem;
  color: var(--btn-color);
  font-size: 0.82rem;
  outline: none;
  font-family: inherit;
  min-height: 34px;
}
.search-info { font-size: 0.65rem; color: var(--muted); white-space: nowrap; }
.search-nav-btn {
  background: rgba(0,194,224,0.1);
  border: 1px solid var(--search-border);
  color: var(--btn-color);
  padding: 0.28rem 0.45rem;
  border-radius: 4px;
  cursor: pointer;
  font-size: 0.75rem;
  min-height: 30px; min-width: 30px;
  -webkit-tap-highlight-color: transparent;
}
.search-close {
  background: none; border: none;
  color: var(--muted); cursor: pointer;
  font-size: 1rem; padding: 0.1rem 0.3rem;
  min-height: 30px;
}

/* ── BOTTOM BAR ── */
#bottom-bar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: var(--bar-h);
  z-index: 100;
  background: var(--bar-bg);
  backdrop-filter: blur(16px);
  border-top: 1px solid var(--bar-border);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 0 10px;
  transition: background 0.2s, border-color 0.2s;
}

.b-btn {
  background: var(--btn-bg);
  border: 1px solid var(--bar-border);
  color: var(--btn-color);
  font-size: 0.72rem;
  padding: 0 12px;
  height: 36px;
  border-radius: 7px;
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  -webkit-tap-highlight-color: transparent;
  transition: border-color 0.15s, color 0.15s, background 0.15s;
}
.b-btn:active, .b-btn:hover { border-color: var(--cyan); color: var(--cyan); background: rgba(0,194,224,0.13); }
.b-btn.active { border-color: var(--cyan); color: var(--cyan); background: rgba(0,194,224,0.15); }
.b-btn:disabled { opacity: 0.3; cursor: not-allowed; pointer-events: none; }

.b-btn.nav { font-size: 1.1rem; width: 40px; padding: 0; }

.b-divider { width: 1px; height: 22px; background: var(--bar-border); flex-shrink: 0; }

.page-display {
  font-size: 0.72rem;
  color: var(--muted);
  white-space: nowrap;
  min-width: 52px;
  text-align: center;
}
.page-input-inline {
  width: 40px; text-align: center;
  background: var(--input-bg);
  border: 1px solid var(--bar-border);
  border-radius: 5px;
  color: var(--btn-color);
  font-size: 0.78rem;
  padding: 0.3rem;
  outline: none;
  height: 32px;
}
.page-input-inline:focus { border-color: var(--cyan); }

/* ── DEVTOOLS OVERLAY ── */
#dt-warning {
  display: none; position: fixed; inset: 0; z-index: 9999;
  background: #0f1535;
  flex-direction: column; align-items: center; justify-content: center;
  gap: 1rem; text-align: center; padding: 2rem;
}
#dt-warning h2 { font-size: 1.4rem; color: var(--cyan); }
#dt-warning p { color: var(--muted); max-width: 320px; line-height: 1.7; font-size: 0.9rem; }
</style>
</head>
<body>

<div id="dt-warning">
  <h2>⚠ Access Paused</h2>
  <p>Developer tools detected. Please close DevTools to continue reading.</p>
</div>

<!-- SCROLL AREA — full screen behind bottom bar -->
<div id="viewer-scroll">
  <div id="viewer-wrap">
    <div id="loading">
      <div class="spinner"></div>
      <p class="load-text">Loading your study notes…</p>
    </div>
  </div>
</div>

<!-- SEARCH BAR (floating) -->
<div id="search-bar">
  <input class="search-input" id="search-input" placeholder="Search document…" oninput="doSearch(this.value)">
  <span class="search-info" id="search-info"></span>
  <button class="search-nav-btn" onclick="prevMatch()">↑</button>
  <button class="search-nav-btn" onclick="nextMatch()">↓</button>
  <button class="search-close" onclick="closeSearch()">✕</button>
</div>

<div id="search-results-panel"></div>

<!-- SINGLE BOTTOM BAR: all controls -->
<div id="bottom-bar">
  <!-- Page nav -->
  <button class="b-btn nav" id="btn-first" onclick="goFirst()">⟪</button>
  <button class="b-btn nav" id="btn-prev" onclick="goPrev()">‹</button>
  <input class="page-input-inline" id="page-input" type="number" min="1" value="1"
    onchange="goToPage(this.value)" onkeydown="if(event.key==='Enter')this.blur();">
  <span class="page-display" id="page-total">/ —</span>
  <button class="b-btn nav" id="btn-next" onclick="goNext()">›</button>
  <button class="b-btn nav" id="btn-last" onclick="goLast()">⟫</button>

  <div class="b-divider"></div>

  <!-- Zoom reset -->
  <button class="b-btn" onclick="fitPage()">100%</button>

  <div class="b-divider"></div>

  <!-- Dual page -->
  <button class="b-btn" id="dual-btn" onclick="toggleDualPage()">⊞ Dual</button>

  <div class="b-divider"></div>

  <!-- Search -->
  <button class="b-btn" id="search-btn" onclick="toggleSearch()">🔍</button>

  <div class="b-divider"></div>

  <!-- Fullscreen -->
  <button class="b-btn" id="fs-btn" onclick="toggleFullscreen()">⛶</button>

  <div class="b-divider"></div>

  <!-- Theme toggle -->
  <button class="b-btn" id="theme-btn" onclick="toggleTheme()">☀️</button>

  <div class="b-divider"></div>

  <!-- Logout -->
  <button class="b-btn" onclick="logout()">↩</button>
</div>

<script>
// ── PROTECTIONS ──
document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('keydown', e => {
  const blocked = [
    e.ctrlKey && ['c','a','s','p','u'].includes(e.key.toLowerCase()),
    e.metaKey && ['c','a','s','p','u'].includes(e.key.toLowerCase()),
    e.key === 'PrintScreen', e.key === 'F12',
    e.ctrlKey && e.shiftKey && ['i','j','c'].includes(e.key.toLowerCase()),
  ];
  if (blocked.some(Boolean)) { e.preventDefault(); e.stopPropagation(); return false; }
});
document.addEventListener('copy', e => e.preventDefault());
document.addEventListener('cut', e => e.preventDefault());
document.addEventListener('dragstart', e => e.preventDefault());
window.addEventListener('beforeprint', e => { e.preventDefault(); window.stop(); });

const dtWarning = document.getElementById('dt-warning');
let devToolsOpen = false;
setInterval(() => {
  const open = window.outerWidth - window.innerWidth > 160 || window.outerHeight - window.innerHeight > 160;
  if (open !== devToolsOpen) { devToolsOpen = open; dtWarning.style.display = open ? 'flex' : 'none'; }
}, 1000);

// ── PDF.JS ──
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

let pdfDoc = null, currentPage = 1, totalPages = 0;
let scale = 1.0, rendering = false, renderQueue = null;
let dualPage = false;
let searchMatches = [], searchMatchIndex = 0, pageTextCache = {};
let userEmail = '';

const scroll = document.getElementById('viewer-scroll');
const wrap = document.getElementById('viewer-wrap');

// ── PINCH-TO-ZOOM ──
let pinchStartDist = null, pinchStartScale = null, pinchActive = false;

scroll.addEventListener('touchstart', e => {
  if (e.touches.length === 2) {
    pinchActive = true;
    pinchStartDist = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
    pinchStartScale = scale;
  } else {
    pinchActive = false;
  }
}, { passive: true });

scroll.addEventListener('touchmove', e => {
  if (e.touches.length === 2 && pinchStartDist !== null) {
    const dist = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
    const newScale = Math.max(0.25, Math.min(3.0, pinchStartScale * (dist / pinchStartDist)));
    scale = newScale;
    wrap.style.transform = `scale(${scale / pinchStartScale})`;
    wrap.style.transformOrigin = 'top center';
  }
}, { passive: true });

scroll.addEventListener('touchend', e => {
  if (pinchActive && e.touches.length < 2) {
    pinchActive = false;
    pinchStartDist = null;
    wrap.style.transform = '';
    renderPage(currentPage);
  }
}, { passive: true });

// ── MOUSE WHEEL ZOOM ──
scroll.addEventListener('wheel', e => {
  e.preventDefault();
  const delta = e.deltaY < 0 ? 1 : -1;
  applyZoom(Math.round(scale * 100) + delta * 10);
}, { passive: false });

// ── LOAD PDF ──
async function loadPDF() {
  try {
    // Get user email from Supabase session
    try {
      const sb = window.supabase.createClient(
        'https://djbiatgxjmvwfcimofjt.supabase.co',
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRqYmlhdGd4am12d2ZjaW1vZmp0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2NjU1MjcsImV4cCI6MjA5MDI0MTUyN30.m_gBey_jA13hVdjttSKtFMcrQO-dGokq1Fpu2XriLp0'
      );
      const { data: { session } } = await sb.auth.getSession();
      if (session && session.user) userEmail = session.user.email || '';
    } catch(e) {}

    document.querySelector('.load-text').textContent = 'Fetching…';
    const response = await fetch('book.pdf');
    const arrayBuffer = await response.arrayBuffer();
    document.querySelector('.load-text').textContent = 'Rendering…';
    pdfDoc = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
    totalPages = pdfDoc.numPages;
    document.getElementById('page-total').textContent = '/ ' + totalPages;
    document.getElementById('page-input').max = totalPages;
    document.getElementById('loading').style.display = 'none';
    fitWidth();
  } catch(e) {
    document.querySelector('.load-text').textContent = 'Error: ' + e.message;
  }
}

// ── RENDER ──
async function renderPage(num) {
  if (rendering) { renderQueue = num; return; }
  rendering = true; currentPage = num; updateNav();
  wrap.querySelectorAll('.canvas-wrap').forEach(el => el.remove());
  wrap.style.transform = '';

  if (dualPage && !isMobile()) {
    await renderCanvas(num);
    if (num + 1 <= totalPages) await renderCanvas(num + 1);
  } else {
    await renderCanvas(num);
  }

  scroll.scrollTo({ top: 0, behavior: 'smooth' });
  rendering = false;
  if (renderQueue !== null) { const next = renderQueue; renderQueue = null; renderPage(next); }
}

function isMobile() { return window.innerWidth < 768; }

async function renderCanvas(num) {
  const page = await pdfDoc.getPage(num);

  // ── HIGH-DPI FIX: render at device pixel ratio to prevent blurriness on zoom ──
  const dpr = window.devicePixelRatio || 1;
  const viewport = page.getViewport({ scale: scale * dpr });

  const div = document.createElement('div');
  div.className = 'canvas-wrap';
  div.dataset.pageNum = num;

  // CSS size = logical pixels; canvas buffer = physical pixels
  const cssW = viewport.width / dpr;
  const cssH = viewport.height / dpr;
  div.style.width = cssW + 'px';
  div.style.height = cssH + 'px';

  const canvas = document.createElement('canvas');
  canvas.width = viewport.width;   // physical
  canvas.height = viewport.height; // physical
  canvas.style.width = cssW + 'px';
  canvas.style.height = cssH + 'px';

  div.appendChild(canvas);
  wrap.appendChild(div);

  await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;

  // ── USER EMAIL STAMP ──
  if (userEmail) {
    const stamp = document.createElement('div');
    stamp.className = 'user-stamp';
    stamp.textContent = userEmail;
    div.appendChild(stamp);
  }

  // Cache text content
  if (!pageTextCache[num]) {
    const tc = await page.getTextContent();
    pageTextCache[num] = { items: tc.items, viewport: page.getViewport({ scale }) };
  }
}

function updateNav() {
  document.getElementById('page-input').value = currentPage;
  const label = dualPage && !isMobile() ? `/ ${Math.min(currentPage+1,totalPages)} of ${totalPages}` : `/ ${totalPages}`;
  document.getElementById('page-total').textContent = label;
  document.getElementById('btn-prev').disabled = currentPage <= 1;
  document.getElementById('btn-first').disabled = currentPage <= 1;
  const atEnd = dualPage && !isMobile() ? currentPage + 2 > totalPages : currentPage >= totalPages;
  document.getElementById('btn-next').disabled = atEnd;
  document.getElementById('btn-last').disabled = currentPage >= totalPages;
}

// ── NAV ──
function goPrev() { if (currentPage > 1) renderPage(dualPage && !isMobile() ? Math.max(1, currentPage - 2) : currentPage - 1); }
function goNext() { const n = dualPage && !isMobile() ? currentPage + 2 : currentPage + 1; if (n <= totalPages) renderPage(n); }
function goFirst() { renderPage(1); }
function goLast() { renderPage(totalPages); }
function goToPage(n) { renderPage(Math.max(1, Math.min(totalPages, parseInt(n) || 1))); }

// ── ZOOM ──
function applyZoom(val) {
  let pct = Math.max(25, Math.min(400, parseInt(val) || 100));
  scale = pct / 100;
  renderPage(currentPage);
}

function fitWidth() {
  const availW = scroll.clientWidth - 32;
  const baseW = dualPage && !isMobile() ? 612 * 2 + 8 : 612;
  applyZoom(Math.round((availW / baseW) * 100));
}

function fitPage() { applyZoom(100); }

window.addEventListener('orientationchange', () => { setTimeout(() => { if (pdfDoc) fitWidth(); }, 300); });
window.addEventListener('resize', () => { if (pdfDoc) fitWidth(); });

// ── DUAL PAGE ──
function toggleDualPage() {
  dualPage = !dualPage;
  document.getElementById('dual-btn').classList.toggle('active', dualPage);
  document.getElementById('dual-btn').textContent = dualPage ? '▣ Single' : '⊞ Dual';
  if (dualPage && currentPage % 2 === 0) currentPage = Math.max(1, currentPage - 1);
  renderPage(currentPage);
}

// ── FULLSCREEN ──
function toggleFullscreen() {
  const el = document.documentElement;
  if (!document.fullscreenElement && !document.webkitFullscreenElement) {
    if (el.requestFullscreen) el.requestFullscreen();
    else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
    document.getElementById('fs-btn').textContent = '✕';
  } else {
    if (document.exitFullscreen) document.exitFullscreen();
    else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
    document.getElementById('fs-btn').textContent = '⛶';
  }
}
document.addEventListener('fullscreenchange', () => { if (!document.fullscreenElement) document.getElementById('fs-btn').textContent = '⛶'; });
document.addEventListener('webkitfullscreenchange', () => { if (!document.webkitFullscreenElement) document.getElementById('fs-btn').textContent = '⛶'; });

// ── SEARCH ──
function toggleSearch() {
  const bar = document.getElementById('search-bar');
  const visible = bar.classList.toggle('visible');
  document.getElementById('search-btn').classList.toggle('active', visible);
  if (visible) document.getElementById('search-input').focus();
  else closeSearch();
}

function closeSearch() {
  document.getElementById('search-bar').classList.remove('visible');
  document.getElementById('search-btn').classList.remove('active');
  document.getElementById('search-input').value = '';
  document.getElementById('search-info').textContent = '';
  document.getElementById('search-results-panel').style.display = 'none';
  document.getElementById('search-results-panel').innerHTML = '';
  clearHighlights(); searchMatches = []; searchMatchIndex = 0;
}

async function doSearch(query) {
  clearHighlights(); searchMatches = [];
  const panel = document.getElementById('search-results-panel');
  if (!query || query.length < 2) {
    document.getElementById('search-info').textContent = '';
    panel.style.display = 'none'; panel.innerHTML = ''; return;
  }
  document.getElementById('search-info').textContent = '…';
  const lq = query.toLowerCase();
  for (let p = 1; p <= totalPages; p++) {
    if (!pageTextCache[p]) {
      const page = await pdfDoc.getPage(p);
      const tc = await page.getTextContent();
      pageTextCache[p] = { items: tc.items, viewport: page.getViewport({ scale }) };
    }
    if (pageTextCache[p].items.map(i => i.str).join(' ').toLowerCase().includes(lq)) searchMatches.push(p);
  }
  if (!searchMatches.length) {
    document.getElementById('search-info').textContent = 'Not found';
    panel.style.display = 'none'; return;
  }
  document.getElementById('search-info').textContent = `${searchMatches.length}pg`;
  searchMatchIndex = 0;
  panel.innerHTML = searchMatches.map(pg => {
    const snippet = pageTextCache[pg].items.map(i => i.str).join(' ');
    const idx = snippet.toLowerCase().indexOf(lq);
    const preview = snippet.substring(Math.max(0, idx - 15), idx + 35).trim();
    return `<div class="result-item" onclick="jumpToMatch(${pg})"><span class="pg">P.${pg}</span>${preview}…</div>`;
  }).join('');
  panel.style.display = 'block';
  jumpToMatch(searchMatches[0]);
}

function jumpToMatch(pg) {
  goToPage(pg);
  setTimeout(() => highlightOnPage(pg, document.getElementById('search-input').value), 700);
}

function highlightOnPage(pageNum, query) {
  clearHighlights();
  const pageDiv = wrap.querySelector(`[data-page-num="${pageNum}"]`);
  if (!pageDiv || !pageTextCache[pageNum]) return;
  const lq = query.toLowerCase();
  const { items } = pageTextCache[pageNum];
  const canvas = pageDiv.querySelector('canvas');
  const cssH = parseFloat(canvas.style.height);
  const cssScale = scale;
  items.forEach(item => {
    if (!item.str.toLowerCase().includes(lq)) return;
    const hl = document.createElement('div');
    hl.className = 'highlight-overlay';
    hl.style.left = (item.transform[4] * cssScale) + 'px';
    hl.style.top = (cssH - item.transform[5] * cssScale - item.height * cssScale) + 'px';
    hl.style.width = (item.width * cssScale) + 'px';
    hl.style.height = Math.max(item.height * cssScale, 10) + 'px';
    pageDiv.appendChild(hl);
  });
}

function clearHighlights() { document.querySelectorAll('.highlight-overlay').forEach(el => el.remove()); }
function prevMatch() { if (!searchMatches.length) return; searchMatchIndex = (searchMatchIndex - 1 + searchMatches.length) % searchMatches.length; jumpToMatch(searchMatches[searchMatchIndex]); }
function nextMatch() { if (!searchMatches.length) return; searchMatchIndex = (searchMatchIndex + 1) % searchMatches.length; jumpToMatch(searchMatches[searchMatchIndex]); }

// ── KEYBOARD ──
document.addEventListener('keydown', e => {
  const active = document.activeElement;
  if (active === document.getElementById('search-input') || active === document.getElementById('page-input')) return;
  if (e.key === 'ArrowRight') goNext();
  if (e.key === 'ArrowLeft') goPrev();
  if (e.key === 'Escape') closeSearch();
  if (e.key === 'f') toggleFullscreen();
});
