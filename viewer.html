<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>F(Orth) Part B — Study Notes</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
<style>
  :root {
    --bg: #f8f9fa;
    --surface: #ffffff;
    --border: rgba(0,0,0,0.08);
    --text: #1a1a1a;
    --muted: #666666;
    --accent: #0084ff;
    --bottom-bar-h: 64px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; background: var(--bg); border: 0; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    color: var(--text);
    user-select: none;
    -webkit-user-select: none;
  }

  /* BOTTOM BAR */
  #bottom-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    height: var(--bottom-bar-h);
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    padding: 0 16px; gap: 8px; z-index: 100;
    box-shadow: 0 -4px 20px rgba(0,0,0,0.08);
  }

  .sb-btn {
    width: 40px; height: 40px;
    background: none; border: none; border-radius: 8px;
    color: var(--muted); font-size: 16px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: color 0.15s, background 0.15s;
    -webkit-tap-highlight-color: transparent; flex-shrink: 0;
  }
  .sb-btn:hover, .sb-btn.active { color: var(--accent); background: rgba(0,132,255,0.08); }
  .sb-btn:active { background: rgba(0,132,255,0.15); }
  .sb-btn:disabled { opacity: 0.3; cursor: default; }

  .sb-divider { width: 1px; height: 24px; background: var(--border); flex-shrink: 0; margin: 0 4px; }
  
  .sb-page {
    display: flex; align-items: center; gap: 6px; padding: 0 8px;
  }
  .sb-page input {
    width: 40px; height: 32px; background: rgba(0,0,0,0.02);
    border: 1px solid var(--border); border-radius: 6px;
    color: var(--text); font-size: 13px; text-align: center; outline: none;
  }
  .sb-page input:focus { border-color: var(--accent); background: rgba(0,132,255,0.05); }
  .sb-page-total { font-size: 12px; color: var(--muted); min-width: 30px; }
  .sb-zoom-group { display: flex; align-items: center; gap: 2px; }
  .sb-zoom-label { font-size: 12px; color: var(--muted); min-width: 45px; text-align: center; }

  /* MAIN SCROLL */
  #viewer-scroll {
    position: fixed; top: 0; left: 0; right: 0;
    bottom: var(--bottom-bar-h);
    overflow-y: auto; overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    background: var(--bg);
    display: flex; flex-direction: column; align-items: center;
    padding: 24px 16px; gap: 24px;
    scroll-behavior: auto; /* Changed to auto for better control during zoom */
    scrollbar-width: none;
  }
  #viewer-scroll::-webkit-scrollbar { display: none; }

  .page-container {
    display: flex; flex-direction: column; align-items: center; gap: 12px;
    width: 100%;
  }

  .canvas-wrap {
    position: relative; flex-shrink: 0;
    box-shadow: 0 4px 32px rgba(0,0,0,0.8);
    border-radius: 4px; overflow: hidden; background: #fff;
    transition: width 0.2s ease-out, height 0.2s ease-out;
  }
  .canvas-wrap canvas { display: block; width: 100%; height: 100%; }

  /* watermark */
  .canvas-wrap::after {
    content: 'F(ORTH) · ORTHO TIMES';
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.9rem; font-weight: 700; letter-spacing: 0.15em;
    color: rgba(0,132,255,0.04); pointer-events: none;
    white-space: nowrap; transform: rotate(-30deg) scale(1.5);
    text-transform: uppercase; z-index: 10;
  }

  .page-badge {
    font-size: 11px; color: var(--muted);
    letter-spacing: 0.1em; font-weight: 600;
  }

  /* LOADING */
  #loading {
    position: absolute; inset: 0; z-index: 1000;
    background: var(--bg);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 16px; color: var(--muted);
  }
  .spinner {
    width: 32px; height: 32px; border: 3px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .load-text { font-size: 14px; letter-spacing: 0.05em; }

  /* SEARCH */
  #search-bar {
    display: none; position: fixed; top: 12px; left: 50%; transform: translateX(-50%); z-index: 200;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 8px 12px; gap: 8px; align-items: center;
    box-shadow: 0 12px 40px rgba(0,0,0,0.1);
    width: min(400px, calc(100vw - 24px));
  }
  #search-bar.visible { display: flex; }
  .search-input {
    flex: 1; background: rgba(0,0,0,0.03);
    border: 1px solid var(--border); border-radius: 8px;
    padding: 8px 12px; color: var(--text); font-size: 14px; outline: none;
  }
  .search-input:focus { border-color: var(--accent); background: rgba(0,132,255,0.05); }
  .search-info { font-size: 12px; color: var(--muted); white-space: nowrap; }
  
  #search-results-panel {
    display: none; position: fixed; top: 70px; left: 50%; transform: translateX(-50%); z-index: 199;
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    width: min(380px, calc(100vw - 24px));
    max-height: 300px; overflow-y: auto;
    box-shadow: 0 12px 40px rgba(0,0,0,0.1);
    scrollbar-width: none;
  }
  #search-results-panel::-webkit-scrollbar { display: none; }
  .result-item {
    padding: 12px 16px; font-size: 13px; cursor: pointer;
    border-bottom: 1px solid var(--border); color: var(--muted);
    transition: background 0.2s;
  }
  .result-item:hover { background: rgba(0,132,255,0.05); color: var(--text); }
  .result-item .pg { color: var(--accent); font-weight: 700; margin-right: 8px; }

  .highlight-overlay {
    position: absolute; background: rgba(255,193,7,0.25);
    border: 1px solid rgba(255,152,0,0.6);
    pointer-events: none; z-index: 11; border-radius: 2px;
  }

  /* DEVTOOLS */
  #dt-warning {
    display: none; position: fixed; inset: 0; z-index: 9999;
    background: var(--bg); flex-direction: column; align-items: center;
    justify-content: center; gap: 12px; text-align: center; padding: 2rem;
  }
  #dt-warning h2 { font-size: 1.5rem; color: var(--accent); }
  #dt-warning p { color: var(--muted); max-width: 320px; line-height: 1.6; }

  @media (max-width: 600px) {
    :root { --bottom-bar-h: 110px; }
    #bottom-bar { flex-wrap: wrap; padding: 8px; gap: 4px; height: auto; min-height: var(--bottom-bar-h); }
    .sb-divider { display: none; }
    .sb-spacer { width: 100%; height: 0; order: 2; }
    .sb-zoom-group { order: 3; }
    .sb-page { order: 1; }
    #search-bar { top: 8px; }
  }
</style>
</head>
<body>

<div id="dt-warning">
  <h2>Access Paused</h2>
  <p>Developer tools detected. Please close DevTools to continue reading.</p>
</div>

<div id="loading">
  <div class="spinner"></div>
  <p class="load-text">Initializing Viewer...</p>
</div>

<div id="search-bar">
  <input class="search-input" id="search-input" placeholder="Search in document..." oninput="doSearch(this.value)">
  <span class="search-info" id="search-info"></span>
  <button class="sb-btn" onclick="prevMatch()">↑</button>
  <button class="sb-btn" onclick="nextMatch()">↓</button>
  <button class="sb-btn" onclick="closeSearch()">✕</button>
</div>
<div id="search-results-panel"></div>

<div id="viewer-scroll">
  <!-- Pages will be injected here -->
</div>

<div id="bottom-bar">
  <button class="sb-btn" onclick="logout()" title="Sign out">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
    </svg>
  </button>

  <div class="sb-divider"></div>

  <button class="sb-btn" id="search-btn" onclick="toggleSearch()" title="Search">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
  </button>

  <button class="sb-btn" id="fs-btn" onclick="toggleFullscreen()" title="Fullscreen">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>
    </svg>
  </button>

  <div class="sb-divider"></div>

  <div class="sb-zoom-group">
    <button class="sb-btn" onclick="zoomOut()" title="Zoom out">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="8" y1="11" x2="14" y2="11"/>
      </svg>
    </button>
    <div class="sb-zoom-label" id="zoom-label">100%</div>
    <button class="sb-btn" onclick="zoomIn()" title="Zoom in">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/>
      </svg>
    </button>
    <button class="sb-btn" onclick="fitWidth()" title="Fit width">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="4 9 9 4 14 9"/><polyline points="20 15 15 20 10 15"/><line x1="9" y1="4" x2="9" y2="20"/>
      </svg>
    </button>
  </div>

  <div class="sb-divider"></div>

  <div class="sb-page">
    <button class="sb-btn" id="btn-prev" onclick="goPrev()" title="Previous page">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </button>
    <input type="number" id="page-input" min="1" value="1" onchange="goToPage(this.value)" onkeydown="if(event.key==='Enter')this.blur();">
    <span class="sb-page-total" id="page-total">/ —</span>
    <button class="sb-btn" id="btn-next" onclick="goNext()" title="Next page">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="9 18 15 12 9 6"/>
      </svg>
    </button>
  </div>
</div>

<script>
// ── SUPABASE ──
const SUPA_URL = 'https://djbiatgxjmvwfcimofjt.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRqYmlhdGd4am12d2ZjaW1vZmp0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2NjU1MjcsImV4cCI6MjA5MDI0MTUyN30.m_gBey_jA13hVdjttSKtFMcrQO-dGokq1Fpu2XriLp0';
const sb = window.supabase.createClient(SUPA_URL, SUPA_KEY);

async function logout() {
  localStorage.removeItem('vaultdocs_session');
  try { await sb.auth.signOut(); } catch(e) {}
  window.location.replace('index.html');
}

// ── PROTECTIONS ──
document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('keydown', e => {
  const blocked = [
    e.ctrlKey && ['c','a','s','p','u'].includes(e.key.toLowerCase()),
    e.metaKey && ['c','a','s','p','u'].includes(e.key.toLowerCase()),
    e.key === 'PrintScreen', e.key === 'F12',
    e.ctrlKey && e.shiftKey && ['i','j','c'].includes(e.key.toLowerCase()),
  ];
  if (blocked.some(Boolean)) { e.preventDefault(); e.stopPropagation(); return false; }
});

const dtWarning = document.getElementById('dt-warning');
let devToolsOpen = false;
setInterval(() => {
  const open = window.outerWidth - window.innerWidth > 160 || window.outerHeight - window.innerHeight > 160;
  if (open !== devToolsOpen) { devToolsOpen = open; dtWarning.style.display = open ? 'flex' : 'none'; }
}, 1000);

// ── PDF.JS ──
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

let pdfDoc = null, currentPage = 1, totalPages = 0;
let scale = 1.0;
let searchMatches = [], searchMatchIndex = 0, pageTextCache = {};
let isRendering = false;

const scroll = document.getElementById('viewer-scroll');

scroll.addEventListener('scroll', () => {
  if (!isRendering) updateCurrentPageFromScroll();
}, { passive: true });

function updateCurrentPageFromScroll() {
  const wraps = scroll.querySelectorAll('.canvas-wrap');
  const scrollMid = scroll.scrollTop + scroll.clientHeight / 2;
  let closest = null, minDist = Infinity;
  wraps.forEach(w => {
    const center = w.offsetTop + w.offsetHeight / 2;
    const dist = Math.abs(center - scrollMid);
    if (dist < minDist) { minDist = dist; closest = w; }
  });
  if (closest) {
    const pn = parseInt(closest.dataset.pageNum);
    if (pn !== currentPage) {
      currentPage = pn;
      document.getElementById('page-input').value = currentPage;
      updateNav();
    }
  }
}

async function loadPDF() {
  try {
    document.querySelector('.load-text').textContent = 'Fetching Document...';
    const response = await fetch('book.pdf');
    const arrayBuffer = await response.arrayBuffer();
    document.querySelector('.load-text').textContent = 'Preparing Pages...';
    pdfDoc = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
    totalPages = pdfDoc.numPages;
    document.getElementById('page-total').textContent = '/ ' + totalPages;
    document.getElementById('page-input').max = totalPages;
    
    // Initial scale
    if (window.innerWidth < 768) {
      const availW = scroll.clientWidth - 32;
      scale = Math.round((availW / 612) * 100) / 100;
    } else {
      scale = 1.0;
    }

    await initializePageContainers();
    document.getElementById('loading').style.display = 'none';
    renderVisiblePages();
  } catch(e) {
    document.querySelector('.load-text').textContent = 'Error: ' + e.message;
  }
}

async function initializePageContainers() {
  scroll.innerHTML = '';
  for (let p = 1; p <= totalPages; p++) {
    const page = await pdfDoc.getPage(p);
    const viewport = page.getViewport({ scale: 1.0 }); // Base size
    
    const container = document.createElement('div');
    container.className = 'page-container';
    container.id = 'page-container-' + p;
    
    const wrap = document.createElement('div');
    wrap.className = 'canvas-wrap';
    wrap.dataset.pageNum = p;
    wrap.style.width = (viewport.width * scale) + 'px';
    wrap.style.height = (viewport.height * scale) + 'px';
    
    const canvas = document.createElement('canvas');
    wrap.appendChild(canvas);
    container.appendChild(wrap);
    
    const badge = document.createElement('div');
    badge.className = 'page-badge';
    badge.textContent = 'PAGE ' + p;
    container.appendChild(badge);
    
    scroll.appendChild(container);
  }
  updateNav();
}

async function renderVisiblePages() {
  if (isRendering) return;
  isRendering = true;
  
  // For simplicity in this fix, we render all pages but with better stability
  // In a production app, we'd only render pages in viewport
  for (let p = 1; p <= totalPages; p++) {
    await renderPage(p);
  }
  
  isRendering = false;
}

async function renderPage(num) {
  const container = document.getElementById('page-container-' + num);
  const wrap = container.querySelector('.canvas-wrap');
  const canvas = wrap.querySelector('canvas');
  
  const page = await pdfDoc.getPage(num);
  const viewport = page.getViewport({ scale });
  
  wrap.style.width = viewport.width + 'px';
  wrap.style.height = viewport.height + 'px';
  
  canvas.width = viewport.width * window.devicePixelRatio;
  canvas.height = viewport.height * window.devicePixelRatio;
  
  const ctx = canvas.getContext('2d');
  const renderContext = {
    canvasContext: ctx,
    viewport: page.getViewport({ scale: scale * window.devicePixelRatio })
  };
  
  await page.render(renderContext).promise;
  
  if (!pageTextCache[num]) {
    const tc = await page.getTextContent();
    pageTextCache[num] = { items: tc.items, viewport };
  }
}

function updateNav() {
  document.getElementById('page-input').value = currentPage;
  document.getElementById('btn-prev').disabled = currentPage <= 1;
  document.getElementById('btn-next').disabled = currentPage >= totalPages;
  document.getElementById('zoom-label').textContent = Math.round(scale * 100) + '%';
}

function scrollToPage(num) {
  num = Math.max(1, Math.min(totalPages, num));
  currentPage = num;
  const container = document.getElementById('page-container-' + num);
  if (container) {
    container.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
  updateNav();
}

function goPrev() { scrollToPage(currentPage - 1); }
function goNext() { scrollToPage(currentPage + 1); }
function goToPage(n) { scrollToPage(parseInt(n) || 1); }

async function applyZoom(newScale) {
  newScale = Math.max(0.25, Math.min(3.0, newScale));
  if (newScale === scale) return;
  
  const oldScale = scale;
  scale = newScale;
  
  // Record current scroll position relative to current page
  const container = document.getElementById('page-container-' + currentPage);
  const relativeScroll = scroll.scrollTop - container.offsetTop;
  const scrollRatio = relativeScroll / (oldScale);

  document.getElementById('zoom-label').textContent = Math.round(scale * 100) + '%';
  
  // Update all container sizes immediately to prevent layout shifts
  for (let p = 1; p <= totalPages; p++) {
    const c = document.getElementById('page-container-' + p);
    const w = c.querySelector('.canvas-wrap');
    const page = await pdfDoc.getPage(p);
    const vp = page.getViewport({ scale });
    w.style.width = vp.width + 'px';
    w.style.height = vp.height + 'px';
  }
  
  // Restore scroll position
  scroll.scrollTop = container.offsetTop + (scrollRatio * scale);
  
  // Re-render
  renderVisiblePages();
}

function zoomIn() { applyZoom(scale + 0.1); }
function zoomOut() { applyZoom(scale - 0.1); }

function fitWidth() {
  const availW = scroll.clientWidth - 48;
  applyZoom(availW / 612);
}

window.addEventListener('resize', () => {
  if (pdfDoc && window.innerWidth < 768) fitWidth();
});

// ── SEARCH ──
function toggleSearch() {
  const bar = document.getElementById('search-bar');
  const visible = bar.classList.toggle('visible');
  document.getElementById('search-btn').classList.toggle('active', visible);
  if (visible) document.getElementById('search-input').focus();
  else closeSearch();
}

function closeSearch() {
  document.getElementById('search-bar').classList.remove('visible');
  document.getElementById('search-btn').classList.remove('active');
  document.getElementById('search-input').value = '';
  document.getElementById('search-info').textContent = '';
  document.getElementById('search-results-panel').style.display = 'none';
  clearHighlights();
  searchMatches = [];
}

async function doSearch(query) {
  clearHighlights(); searchMatches = [];
  const panel = document.getElementById('search-results-panel');
  if (!query || query.length < 2) {
    document.getElementById('search-info').textContent = '';
    panel.style.display = 'none'; return;
  }
  document.getElementById('search-info').textContent = '...';
  const lq = query.toLowerCase();
  for (let p = 1; p <= totalPages; p++) {
    if (!pageTextCache[p]) {
      const page = await pdfDoc.getPage(p);
      const tc = await page.getTextContent();
      pageTextCache[p] = { items: tc.items, viewport: page.getViewport({ scale: 1.0 }) };
    }
    if (pageTextCache[p].items.map(i => i.str).join(' ').toLowerCase().includes(lq)) searchMatches.push(p);
  }
  
  if (!searchMatches.length) {
    document.getElementById('search-info').textContent = '0 found';
    panel.style.display = 'none'; return;
  }
  
  document.getElementById('search-info').textContent = searchMatches.length + ' found';
  panel.innerHTML = searchMatches.map(pg => {
    const snippet = pageTextCache[pg].items.map(i => i.str).join(' ');
    const idx = snippet.toLowerCase().indexOf(lq);
    const preview = snippet.substring(Math.max(0, idx - 20), idx + 40).trim();
    return `<div class="result-item" onclick="jumpToMatch(${pg})"><span class="pg">P.${pg}</span>...${preview}...</div>`;
  }).join('');
  panel.style.display = 'block';
}

function jumpToMatch(pg) {
  scrollToPage(pg);
  setTimeout(() => highlightOnPage(pg, document.getElementById('search-input').value), 500);
}

function highlightOnPage(pageNum, query) {
  clearHighlights();
  const container = document.getElementById('page-container-' + pageNum);
  const wrap = container.querySelector('.canvas-wrap');
  if (!wrap || !pageTextCache[pageNum]) return;
  const lq = query.toLowerCase();
  const { items } = pageTextCache[pageNum];
  const canvas = wrap.querySelector('canvas');
  const h = canvas.height / window.devicePixelRatio;
  const w = canvas.width / window.devicePixelRatio;
  
  items.forEach(item => {
    if (!item.str.toLowerCase().includes(lq)) return;
    const hl = document.createElement('div');
    hl.className = 'highlight-overlay';
    hl.style.left = (item.transform[4] * scale) + 'px';
    hl.style.top = (h - item.transform[5] * scale - item.height * scale) + 'px';
    hl.style.width = (item.width * scale) + 'px';
    hl.style.height = (item.height * scale) + 'px';
    wrap.appendChild(hl);
  });
}

function clearHighlights() { document.querySelectorAll('.highlight-overlay').forEach(el => el.remove()); }
function prevMatch() { if (!searchMatches.length) return; searchMatchIndex = (searchMatchIndex - 1 + searchMatches.length) % searchMatches.length; jumpToMatch(searchMatches[searchMatchIndex]); }
function nextMatch() { if (!searchMatches.length) return; searchMatchIndex = (searchMatchIndex + 1) % searchMatches.length; jumpToMatch(searchMatches[searchMatchIndex]); }

function toggleFullscreen() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen();
  } else {
    document.exitFullscreen();
  }
}

// ── AUTH CHECK ──
(async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    const { data: profile } = await sb.from('profiles').select('approved').eq('id', session.user.id).single();
    if (profile?.approved) {
      loadPDF();
      return;
    }
    await sb.auth.signOut();
  }
  window.location.replace('index.html');
})();
</script>
