<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>F(Orth) Part B — Study Notes</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
<style>
  /* ── THEMES ── */
  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --border: rgba(255,255,255,0.08);
    --text: #d0d0d0;
    --muted: #555;
    --accent: #00c2e0;
    --page-bg: #1a1a1a;
    --bar-h: 52px;
  }
  body.light {
    --bg: #f0f0f0;
    --surface: #ffffff;
    --border: rgba(0,0,0,0.1);
    --text: #222;
    --muted: #999;
    --accent: #0099bb;
    --page-bg: #e8e8e8;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; background: var(--bg); transition: background 0.2s; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; color: var(--text); user-select: none; -webkit-user-select: none; }

  /* ── SCROLL AREA ── */
  #scroll {
    position: fixed;
    top: 0; left: 0; right: 0;
    bottom: var(--bar-h);
    overflow-y: scroll;
    overflow-x: hidden;
    background: var(--bg);
    transition: background 0.2s;
    scrollbar-width: none;
  }
  #scroll::-webkit-scrollbar { display: none; }

  /* ── PAGES CONTAINER ──
     Pages render at BASE scale (fit-width).
     Zoom is applied via CSS transform on this element only.
     No re-render needed on zoom. */
  #pages {
    position: relative;
    margin: 0 auto;
    transform-origin: top center;
    /* width + height set by JS after first render */
  }

  .pg-wrap {
    position: absolute;
    background: #fff;
    box-shadow: 0 2px 16px rgba(0,0,0,0.4);
    border-radius: 2px;
    overflow: hidden;
  }
  body.light .pg-wrap { box-shadow: 0 2px 12px rgba(0,0,0,0.15); }

  .pg-wrap canvas { display: block; }

  /* placeholder shown while page not yet rendered */
  .pg-placeholder {
    position: absolute;
    background: var(--page-bg);
    border-radius: 2px;
    display: flex; align-items: center; justify-content: center;
  }
  .pg-placeholder::after {
    content: '';
    width: 24px; height: 24px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }



  /* ── BOTTOM BAR ── */
  #bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: var(--bar-h);
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex; align-items: center;
    padding: 0 10px; gap: 6px;
    z-index: 100;
    transition: background 0.2s, border-color 0.2s;
  }

  .btn {
    height: 32px; min-width: 32px;
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    font-size: 12px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    padding: 0 8px; gap: 4px;
    transition: color 0.15s, border-color 0.15s, background 0.15s;
    -webkit-tap-highlight-color: transparent;
    white-space: nowrap; flex-shrink: 0;
  }
  .btn:hover  { color: var(--accent); border-color: var(--accent); }
  .btn:active { background: rgba(0,153,187,0.12); }
  .btn:disabled { opacity: 0.2; pointer-events: none; }
  .btn.on { color: var(--accent); border-color: var(--accent); background: rgba(0,153,187,0.1); }

  .sep { width: 1px; height: 20px; background: var(--border); flex-shrink: 0; }
  .spacer { flex: 1; }

  .page-inp {
    width: 40px; height: 32px;
    background: transparent; border: 1px solid var(--border);
    border-radius: 6px; color: var(--text);
    font-size: 12px; text-align: center; outline: none;
    transition: border-color 0.15s;
  }
  .page-inp:focus { border-color: var(--accent); }

  .lbl { font-size: 11px; color: var(--muted); white-space: nowrap; }

  /* ── SEARCH ── */
  #sbox {
    display: none;
    position: fixed;
    bottom: calc(var(--bar-h) + 10px);
    left: 50%; transform: translateX(-50%);
    z-index: 200;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 10px; gap: 6px;
    align-items: center;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    width: min(380px, 90vw);
    transition: background 0.2s;
  }
  #sbox.on { display: flex; }
  .si {
    flex: 1; background: rgba(128,128,128,0.1);
    border: 1px solid var(--border); border-radius: 5px;
    padding: 5px 10px; color: var(--text); font-size: 13px; outline: none;
  }
  .si:focus { border-color: var(--accent); }
  .slbl { font-size: 10px; color: var(--muted); white-space: nowrap; }
  .snav { background: none; border: 1px solid var(--border); color: var(--muted); padding: 3px 8px; border-radius: 4px; cursor: pointer; font-size: 12px; }
  .snav:hover { color: var(--accent); border-color: var(--accent); }
  .sx { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 16px; line-height: 1; }
  .sx:hover { color: var(--text); }

  .hl {
    position: absolute; background: rgba(255,200,0,0.4);
    border: 1px solid rgba(255,180,0,0.8);
    pointer-events: none; z-index: 3; border-radius: 2px;
  }

  /* ── LOADING SCREEN ── */
  #loading {
    position: fixed; inset: 0; bottom: var(--bar-h);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 14px; background: var(--bg); z-index: 50;
    transition: background 0.2s;
  }
  #loading.gone { display: none; }
  .ld-spin {
    width: 32px; height: 32px;
    border: 2px solid var(--border); border-top-color: var(--accent);
    border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  #load-txt { font-size: 12px; color: var(--muted); }
  #load-prog { font-size: 11px; color: var(--accent); }

  /* ── DEV TOOLS ── */
  #dtw {
    display: none; position: fixed; inset: 0; z-index: 9999;
    background: var(--bg); flex-direction: column;
    align-items: center; justify-content: center;
    gap: 12px; text-align: center; padding: 2rem;
  }
  #dtw h2 { color: var(--accent); font-size: 1.1rem; }
  #dtw p  { color: var(--muted); font-size: 0.85rem; max-width: 280px; line-height: 1.7; }

  @media (max-width: 500px) {
    .hide-sm { display: none !important; }
    #bar { gap: 4px; padding: 0 6px; }
  }

  /* ── SEARCH RESULTS DROPDOWN ── */
  #s-results {
    display: none;
    position: fixed;
    bottom: calc(var(--bar-h) + 62px);
    left: 50%; transform: translateX(-50%);
    z-index: 201;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    width: min(380px, 90vw);
    max-height: 220px;
    overflow-y: auto;
    scrollbar-width: none;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  #s-results::-webkit-scrollbar { display: none; }
  #s-results.on { display: block; }
  .sr-item {
    padding: 9px 14px;
    font-size: 12px;
    cursor: pointer;
    border-bottom: 1px solid var(--border);
    color: var(--muted);
    display: flex; gap: 8px; align-items: baseline;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.1s;
  }
  .sr-item:last-child { border-bottom: none; }
  .sr-item:hover, .sr-item:active { background: rgba(0,153,187,0.08); color: var(--text); }
  .sr-pg { color: var(--accent); font-weight: 700; font-size: 11px; white-space: nowrap; }
  .sr-snip { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
</style>
</head>
<body>

<div id="loading">

<div id="scroll">

</div>

<div id="sbox">
  <input class="si" id="si" placeholder="Search…" oninput="onSearch(this.value)">
  <span class="slbl" id="slbl"></span>
  <button class="snav" onclick="searchStep(-1)">↑</button>
  <button class="snav" onclick="searchStep(1)">↓</button>

<div id="s-results"></div>
<div id="bar">
  <!-- Page nav -->
  <button class="btn" id="btn-prev" onclick="goPrev()">
    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <input class="page-inp" id="page-inp" type="number" min="1" value="1"

  <span class="lbl" id="pg-total">/ —</span>
  <button class="btn" id="btn-next" onclick="goNext()">

  </button>

  <div class="sep"></div>

  <!-- Zoom — CSS transform only, no re-render -->
  <button class="btn" onclick="zoom(-0.1)">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
  </button>
  <span class="lbl hide-sm" id="zoom-lbl">100%</span>
  <button class="btn" onclick="zoom(0.1)">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
  </button>
  <button class="btn hide-sm" onclick="resetZoom()">1:1</button>

  <div class="sep"></div>

  <!-- Search -->
  <button class="btn" id="s-btn" onclick="toggleSearch()">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
  </button>

  <div class="spacer"></div>

  <!-- Light/Dark toggle -->
  <button class="btn" id="theme-btn" onclick="toggleTheme()" title="Toggle light/dark">
    <svg id="theme-icon-dark" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
    <svg id="theme-icon-light" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
  </button>

  <!-- Fullscreen -->
  <button class="btn" id="fs-btn" onclick="toggleFS()">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
  </button>

  <!-- Logout -->
  <button class="btn" onclick="logout()">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
  </button>

<script>
// ── SUPABASE ──
const SUPA_URL = 'https://djbiatgxjmvwfcimofjt.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRqYmlhdGd4am12d2ZjaW1vZmp0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2NjU1MjcsImV4cCI6MjA5MDI0MTUyN30.m_gBey_jA13hVdjttSKtFMcrQO-dGokq1Fpu2XriLp0';
const sb = window.supabase.createClient(SUPA_URL, SUPA_KEY);

async function logout() {
  localStorage.removeItem('vaultdocs_session');
  try { await sb.auth.signOut(); } catch(e) {}
  window.location.replace('index.html');
}

// ── PROTECTIONS ──
document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('copy',      e => e.preventDefault());
document.addEventListener('cut',       e => e.preventDefault());
document.addEventListener('dragstart', e => e.preventDefault());
window.addEventListener('beforeprint', e => { e.preventDefault(); window.stop(); });
document.addEventListener('keydown', e => {
  const b = [
    e.ctrlKey  && ['c','a','s','p','u'].includes(e.key.toLowerCase()),
    e.metaKey  && ['c','a','s','p','u'].includes(e.key.toLowerCase()),
    e.key === 'PrintScreen', e.key === 'F12',
    e.ctrlKey && e.shiftKey && ['i','j','c'].includes(e.key.toLowerCase()),
  ];
  if (b.some(Boolean)) { e.preventDefault(); e.stopPropagation(); return false; }
});
const dtw = document.getElementById('dtw');
let dtOpen = false;
setInterval(() => {
  const o = window.outerWidth - window.innerWidth > 160 || window.outerHeight - window.innerHeight > 160;
  if (o !== dtOpen) { dtOpen = o; dtw.style.display = o ? 'flex' : 'none'; }
}, 1000);

// ── THEME ──
let isDark = localStorage.getItem('theme') !== 'light';
function applyTheme() {
  document.body.classList.toggle('light', !isDark);
  document.getElementById('theme-icon-dark').style.display  = isDark  ? 'block' : 'none';
  document.getElementById('theme-icon-light').style.display = !isDark ? 'block' : 'none';
}
function toggleTheme() {
  isDark = !isDark;
  localStorage.setItem('theme', isDark ? 'dark' : 'light');
  applyTheme();
}
applyTheme();

// ── PDF STATE ──
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

let pdf = null;
let totalPages = 0;
let baseScale = 1;       // scale pages are rendered at (fit-width, set once)
let zoomLevel = 1;       // CSS zoom multiplier (no re-render)
let currentPage = 1;
let pageTopOffsets = []; // px top of each page inside #pages (at baseScale)
let pageNaturalH  = []; // rendered height of each page at baseScale
let pageNaturalW  = []; // rendered width of each page at baseScale
let rendered = new Set();
let rendering = new Set();
let textCache = {};      // pageNum → {items}
let scrollLocked = false;

const scrollEl = document.getElementById('scroll');
const pagesEl  = document.getElementById('pages');

// ── ZOOM (CSS transform — instant, no re-render) ──
// We scale #pages with transform: scale(zoomLevel).
// The scroll container needs its scrollHeight to reflect the scaled size,
// so we set pagesEl height = naturalHeight * zoomLevel and use transform-origin top center.

function applyZoom() {
  const z = zoomLevel;
  pagesEl.style.transform = `scale(${z})`;
  pagesEl.style.transformOrigin = 'top center';
  // Make the scroll container "see" the scaled height by wrapping height
  const scaledH = pagesEl._naturalH * z;
  const scaledW = pagesEl._naturalW * z;
  pagesEl.style.marginBottom = (scaledH - pagesEl._naturalH) + 'px';
  // keep scroll container wide enough
  scrollEl.style.minWidth = scaledW + 'px';
  document.getElementById('zoom-lbl').textContent = Math.round(z * 100) + '%';
}

function zoom(delta) {
  zoomLevel = Math.max(0.3, Math.min(3.0, Math.round((zoomLevel + delta) * 10) / 10));
  applyZoom();
}
function resetZoom() { zoomLevel = 1; applyZoom(); }

// ── SCROLL → PAGE TRACKING ──
scrollEl.addEventListener('scroll', () => {
  if (scrollLocked) return;
  // account for zoom: the visual top of each page = pageTopOffsets[i] * zoomLevel
  const scrollTop = scrollEl.scrollTop;
  const z = zoomLevel;
  let pg = 1;
  for (let i = 0; i < totalPages; i++) {
    if (pageTopOffsets[i] * z <= scrollTop + 40) pg = i + 1;
    else break;
  }
  if (pg !== currentPage) {
    currentPage = pg;
    document.getElementById('page-inp').value = pg;
    updateNavBtns();
  }
  lazyRender();
}, { passive: true });

// ── LAZY RENDER ──
// Only render pages that are near the viewport. Use IntersectionObserver on placeholders.
function lazyRender() {
  if (!pdf) return;
  const z = zoomLevel;
  const vTop    = scrollEl.scrollTop / z;
  const vBottom = (scrollEl.scrollTop + scrollEl.clientHeight) / z;
  const buffer  = scrollEl.clientHeight / z; // one screen buffer above/below

  for (let i = 0; i < totalPages; i++) {
    const pgNum = i + 1;
    const pgTop = pageTopOffsets[i];
    const pgBot = pgTop + pageNaturalH[i];

    const inView = pgBot >= vTop - buffer && pgTop <= vBottom + buffer;
    if (inView && !rendered.has(pgNum) && !rendering.has(pgNum)) {
      renderPage(pgNum);
    }
  }
}

async function renderPage(pgNum) {
  if (rendering.has(pgNum) || rendered.has(pgNum)) return;
  rendering.add(pgNum);

  const placeholder = pagesEl.querySelector(`.pg-placeholder[data-pg="${pgNum}"]`);
  if (!placeholder) { rendering.delete(pgNum); return; }

  try {
    const page = await pdf.getPage(pgNum);
    const vp   = page.getViewport({ scale: baseScale });

    const dpr = window.devicePixelRatio || 1;
    const canvas = document.createElement('canvas');
    canvas.width  = Math.floor(vp.width  * dpr);
    canvas.height = Math.floor(vp.height * dpr);
    canvas.style.width  = vp.width  + 'px';
    canvas.style.height = vp.height + 'px';
    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);
    await page.render({ canvasContext: ctx, viewport: vp }).promise;

    // cache text
    if (!textCache[pgNum]) {
      const tc = await page.getTextContent();
      textCache[pgNum] = { items: tc.items, vpH: vp.height };
    }

    // replace placeholder with rendered canvas wrap
    const wrap = document.createElement('div');
    wrap.className = 'pg-wrap';
    wrap.dataset.pg = pgNum;
    wrap.style.cssText = placeholder.style.cssText;
    wrap.appendChild(canvas);
    placeholder.replaceWith(wrap);

    rendered.add(pgNum);
  } catch(e) {
    // silently skip failed pages
  }
  rendering.delete(pgNum);
}

// ── LOAD PDF ──
async function loadPDF() {
  setTxt('Fetching…');
  const res = await fetch('book.pdf');
  const buf = await res.arrayBuffer();
  setTxt('Initialising…');

  pdf = await pdfjsLib.getDocument({ data: buf }).promise;
  totalPages = pdf.numPages;
  document.getElementById('pg-total').textContent  = '/ ' + totalPages;
  document.getElementById('page-inp').max = totalPages;

  // Get baseScale from first page to fit viewport width
  const pg1  = await pdf.getPage(1);
  const vp1  = pg1.getViewport({ scale: 1 });
  const avail = scrollEl.clientWidth - 32;
  baseScale  = avail / vp1.width;

  setTxt('Building layout…');
  setProgress('');

  // Pre-compute layout using only page 1 aspect ratio for speed.
  // Then correct each page's height after first render.
  // For most textbooks all pages are the same size — this is fast enough.
  const GAP     = 16;
  const PADDING = 20;

  // Sample up to 5 pages to get representative sizes quickly
  const sampleNums = [1, Math.ceil(totalPages/4), Math.ceil(totalPages/2), Math.ceil(3*totalPages/4), totalPages];
  const sampleSizes = {};
  for (const n of sampleNums) {
    if (n < 1 || n > totalPages) continue;
    const p = await pdf.getPage(n);
    const v = p.getViewport({ scale: baseScale });
    sampleSizes[n] = { w: v.width, h: v.height };
  }

  // Build placeholder layout
  let top = PADDING;
  let maxW = 0;

  pagesEl.innerHTML = '';
  pageTopOffsets = [];
  pageNaturalH   = [];
  pageNaturalW   = [];

  for (let i = 1; i <= totalPages; i++) {
    // Interpolate size from samples (or use page 1 as default)
    const size = sampleSizes[i] || sampleSizes[1];
    const w = size.w, h = size.h;

    pageTopOffsets.push(top);
    pageNaturalH.push(h);
    pageNaturalW.push(w);
    if (w > maxW) maxW = w;

    const ph = document.createElement('div');
    ph.className = 'pg-placeholder';
    ph.dataset.pg = i;
    ph.style.cssText = `left:0;top:${top}px;width:${w}px;height:${h}px;`;
    pagesEl.appendChild(ph);

    top += h + GAP;
  }

  const naturalH = top - GAP + PADDING;
  const naturalW = maxW;
  pagesEl._naturalH = naturalH;
  pagesEl._naturalW = naturalW;
  pagesEl.style.width    = naturalW + 'px';
  pagesEl.style.height   = naturalH + 'px';
  pagesEl.style.position = 'relative';

  // Centre placeholders horizontally
  pagesEl.querySelectorAll('.pg-placeholder').forEach((ph, i) => {
    const w = pageNaturalW[i];
    ph.style.left = ((naturalW - w) / 2) + 'px';
  });

  applyZoom();
  hideLoading();
  updateNavBtns();

  // Render first 3 pages immediately, rest lazily
  for (let i = 1; i <= Math.min(3, totalPages); i++) renderPage(i);
  // Start lazy loop for remaining visible
  setTimeout(lazyRender, 100);
}

function setTxt(t) { document.getElementById('load-txt').textContent = t; }
function setProgress(t) { document.getElementById('load-prog').textContent = t; }
function hideLoading() { document.getElementById('loading').classList.add('gone'); }

// ── NAV ──
function updateNavBtns() {
  document.getElementById('page-inp').value    = currentPage;
  document.getElementById('btn-prev').disabled = currentPage <= 1;
  document.getElementById('btn-next').disabled = currentPage >= totalPages;
}

function scrollToPage(n) {
  n = Math.max(1, Math.min(totalPages, n));
  currentPage = n;
  scrollLocked = true;
  const targetScroll = pageTopOffsets[n - 1] * zoomLevel;
  scrollEl.scrollTo({ top: targetScroll, behavior: 'smooth' });
  setTimeout(() => { scrollLocked = false; lazyRender(); }, 600);
  updateNavBtns();
}

function goPrev()    { scrollToPage(currentPage - 1); }
function goNext()    { scrollToPage(currentPage + 1); }
function goToPage(n) { scrollToPage(parseInt(n) || 1); }

// ── SEARCH ──
let sMatches = [], sIdx = 0;

function toggleSearch() {
  const box = document.getElementById('sbox');
  const on  = box.classList.toggle('on');
  document.getElementById('s-btn').classList.toggle('on', on);
  if (on) document.getElementById('si').focus();
  else closeSearch();
}

function closeSearch() {
  document.getElementById('sbox').classList.remove('on');
  document.getElementById('s-btn').classList.remove('on');
  document.getElementById('s-results').classList.remove('on');
  document.getElementById('s-results').innerHTML = '';
  document.getElementById('si').value = '';
  document.getElementById('slbl').textContent = '';
  clearHl();
  sMatches = []; sIdx = 0;
}

async function onSearch(q) {
  clearHl(); sMatches = [];
  const resList = document.getElementById('s-results');
  if (!q || q.length < 2) {
    document.getElementById('slbl').textContent = '';
    resList.classList.remove('on');
    resList.innerHTML = '';
    return;
  }
  document.getElementById('slbl').textContent = '…';
  const lq = q.toLowerCase();
  for (let p = 1; p <= totalPages; p++) {
    if (!textCache[p]) {
      const pg = await pdf.getPage(p);
      const tc = await pg.getTextContent();
      const vp = pg.getViewport({ scale: baseScale });
      textCache[p] = { items: tc.items, vpH: vp.height };
    }
    if (textCache[p].items.some(it => it.str.toLowerCase().includes(lq))) sMatches.push(p);
  }
  if (!sMatches.length) {
    document.getElementById('slbl').textContent = 'Not found';
    resList.classList.remove('on'); resList.innerHTML = '';
    return;
  }
  document.getElementById('slbl').textContent = sMatches.length + (sMatches.length === 1 ? ' page' : ' pages');

  // Build dropdown
  resList.innerHTML = sMatches.map((pg, i) => {
    const txt = textCache[pg].items.map(it => it.str).join(' ');
    const idx = txt.toLowerCase().indexOf(lq);
    const snip = idx >= 0 ? txt.substring(Math.max(0, idx - 20), idx + 40).trim() : txt.substring(0, 60).trim();
    return '<div class="sr-item" onclick="pickResult('+i+')">'+'<span class="sr-pg">P.'+pg+'</span>'+'<span class="sr-snip">'+snip+'…</span></div>';
  }).join('');
  resList.classList.add('on');

  sIdx = 0;
  jumpMatch();
}

function pickResult(i) {
  sIdx = i;
  jumpMatch();
  document.getElementById('s-results').classList.remove('on');
}

function jumpMatch() {
  const pg = sMatches[sIdx];
  scrollToPage(pg);
  const q = document.getElementById('si').value;
  setTimeout(() => hlPage(pg, q), 400);
}

function searchStep(d) {
  if (!sMatches.length) return;
  sIdx = (sIdx + d + sMatches.length) % sMatches.length;
  jumpMatch();
}

function hlPage(pgNum, q) {
  clearHl();
  const wrap = pagesEl.querySelector(`.pg-wrap[data-pg="${pgNum}"]`);
  if (!wrap || !textCache[pgNum]) return;
  const { items, vpH } = textCache[pgNum];
  const lq = q.toLowerCase();
  items.forEach(it => {
    if (!it.str.toLowerCase().includes(lq)) return;
    const hl = document.createElement('div');
    hl.className = 'hl';
    hl.style.left   = (it.transform[4] * baseScale) + 'px';
    hl.style.top    = (vpH - it.transform[5] * baseScale - it.height * baseScale) + 'px';
    hl.style.width  = Math.max(it.width * baseScale, 4) + 'px';
    hl.style.height = Math.max(it.height * baseScale, 10) + 'px';
    wrap.appendChild(hl);
  });
}

function clearHl() { document.querySelectorAll('.hl').forEach(e => e.remove()); }

// ── FULLSCREEN ──
function toggleFS() {
  const el = document.documentElement;
  if (!document.fullscreenElement && !document.webkitFullscreenElement)
    (el.requestFullscreen || el.webkitRequestFullscreen).call(el);
  else
    (document.exitFullscreen || document.webkitExitFullscreen).call(document);
}

// ── KEYBOARD ──
document.addEventListener('keydown', e => {
  const a = document.activeElement;
  if (a && (a.id === 'si' || a.id === 'page-inp')) return;
  if (e.key === 'ArrowDown'  || e.key === 'ArrowRight') { e.preventDefault(); goNext(); }
  if (e.key === 'ArrowUp'    || e.key === 'ArrowLeft')  { e.preventDefault(); goPrev(); }
  if (e.key === 'Escape') closeSearch();
  if (e.key === 'f') toggleFS();
  if (e.key === '+' || e.key === '=') zoom(0.1);
  if (e.key === '-') zoom(-0.1);
});


// ── CLOSE SEARCH RESULTS ON OUTSIDE CLICK/TOUCH ──
document.addEventListener('pointerdown', e => {
  const sbox = document.getElementById('sbox');
  const resList = document.getElementById('s-results');
  const sBtn = document.getElementById('s-btn');
  if (!sbox.contains(e.target) && !resList.contains(e.target) && !sBtn.contains(e.target)) {
    resList.classList.remove('on');
    // If search box is open but user tapped away, close the whole search
    if (sbox.classList.contains('on')) closeSearch();
  }
});

// ── AUTH ──
(async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    const { data: profile } = await sb.from('profiles').select('approved').eq('id', session.user.id).single();
    if (profile?.approved) {
      localStorage.setItem('vaultdocs_session', session.access_token);
      try { await loadPDF(); } catch(e) { setTxt('Error: ' + e.message); }
      return;
    }
    await sb.auth.signOut();
  }
  localStorage.removeItem('vaultdocs_session');
  window.location.replace('index.html');
})();
</script>
