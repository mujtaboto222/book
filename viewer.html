<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Secure PDF Viewer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
body { margin:0; font-family:Arial; background:#f5f5f5; overflow:hidden; }
#viewerContainer { position:absolute; top:0; left:0; right:0; bottom:60px; overflow:auto; display:flex; justify-content:center; }
canvas { margin:20px auto; box-shadow:0 4px 20px rgba(0,0,0,0.1); border-radius:10px; }
#toolbar { position:fixed; bottom:0; width:100%; height:60px; background:white; display:flex; justify-content:center; align-items:center; gap:10px; border-top:1px solid #ddd; }
button { padding:10px 15px; border:none; background:black; color:white; border-radius:6px; cursor:pointer; }
#sidebar { position:fixed; left:0; top:0; bottom:60px; width:90px; overflow:auto; background:white; border-right:1px solid #ddd; }
.thumb { width:70px; margin:10px; cursor:pointer; border-radius:6px; }
#overlay { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; background:transparent; }
.blur { filter:blur(10px); }
</style>
</head>
<body>

<div id="sidebar"></div>

<div id="viewerContainer">
  <canvas id="pdfCanvas"></canvas>
</div>

<div id="overlay"></div>

<div id="toolbar">
  <button onclick="prevPage()">Prev</button>
  <span id="pageInfo"></span>
  <button onclick="nextPage()">Next</button>
  <button onclick="zoomIn()">Zoom +</button>
  <button onclick="zoomOut()">Zoom -</button>
  <button onclick="toggleFullscreen()">Fullscreen</button>
</div>

<script>

const url = 'book.pdf';
let pdfDoc = null, pageNum = 1, scale = 1.2;
const canvas = document.getElementById('pdfCanvas');
const ctx = canvas.getContext('2d');

pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

pdfjsLib.getDocument(url).promise.then(pdf => {
  pdfDoc = pdf;
  renderPage(pageNum);
  generateThumbnails();
});

function renderPage(num) {
  pdfDoc.getPage(num).then(page => {
    const viewport = page.getViewport({ scale });
    canvas.height = viewport.height;
    canvas.width = viewport.width;
    page.render({ canvasContext: ctx, viewport });
    document.getElementById('pageInfo').innerText = `Page ${num}/${pdfDoc.numPages}`;
    preloadPage(num+1);
  });
}

function preloadPage(num){
  if(num > pdfDoc.numPages) return;
  pdfDoc.getPage(num);
}

function nextPage(){ if(pageNum < pdfDoc.numPages){ pageNum++; renderPage(pageNum);} }
function prevPage(){ if(pageNum > 1){ pageNum--; renderPage(pageNum);} }
function zoomIn(){ if(scale < 2){ scale += 0.2; renderPage(pageNum);} }
function zoomOut(){ if(scale > 0.8){ scale -= 0.2; renderPage(pageNum);} }

// 📱 Swipe support
let touchStartX = 0;
document.addEventListener('touchstart', e => touchStartX = e.changedTouches[0].screenX);
document.addEventListener('touchend', e => {
  let diff = e.changedTouches[0].screenX - touchStartX;
  if(diff > 50) prevPage();
  if(diff < -50) nextPage();
});

// 📂 Thumbnails
function generateThumbnails(){
  const sidebar = document.getElementById('sidebar');
  for(let i=1;i<=pdfDoc.numPages;i++){
    pdfDoc.getPage(i).then(page=>{
      const viewport = page.getViewport({ scale:0.2 });
      const c = document.createElement('canvas');
      c.width = viewport.width; c.height = viewport.height;
      page.render({ canvasContext: c.getContext('2d'), viewport });
      c.className = 'thumb';
      c.onclick = ()=>{ pageNum=i; renderPage(i); };
      sidebar.appendChild(c);
    });
  }
}

// 🔒 Anti-screenshot overlay flicker
setInterval(()=>{
  const overlay = document.getElementById('overlay');
  overlay.style.background = Math.random()>0.5 ? 'rgba(0,0,0,0.01)' : 'transparent';
},200);

// 🔒 Detect dev tools
setInterval(()=>{
  if(window.outerWidth - window.innerWidth > 160){
    document.body.classList.add('blur');
  } else {
    document.body.classList.remove('blur');
  }
},1000);

// 🔒 Disable right click & shortcuts
document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('keydown', e => {
  if(e.ctrlKey && ['s','p','u'].includes(e.key.toLowerCase())) e.preventDefault();
});

// 🖥 Fullscreen
function toggleFullscreen(){
  if(!document.fullscreenElement){ document.documentElement.requestFullscreen(); }
  else { document.exitFullscreen(); }
}

</script>

</body>
</html>
